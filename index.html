<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Для Манюні ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(20, 20, 25, 0.4);
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at 70% 30%, #36173d, #14081c, #000000);
            font-family: 'Montserrat', sans-serif;
            color: white; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        /* Стартовий екран-термінал */
        .cli-container {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 35px;
            width: 85vw; max-width: 450px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
        }

        .cli-text {
            font-family: 'Fira Code', monospace;
            font-size: 1.5rem; color: #ff758c;
            min-height: 60px; line-height: 1.5;
            margin-bottom: 30px;
        }

        .cursor { animation: blink 0.8s infinite; color: white; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .btn-glow {
            background: linear-gradient(135deg, #ff4d6d, #c9184a);
            color: white; border: none;
            padding: 18px 32px; border-radius: 16px;
            font-size: 1.1rem; font-weight: 800; width: 100%;
            cursor: pointer; box-shadow: 0 10px 25px rgba(255,77,109,0.4);
            animation: pulseGlow 2s infinite; transition: transform 0.2s;
        }
        .btn-glow:active { transform: scale(0.95); }
        @keyframes pulseGlow {
            0% { box-shadow: 0 10px 25px rgba(255,77,109,0.4); }
            50% { box-shadow: 0 10px 40px rgba(255,77,109,0.7); }
            100% { box-shadow: 0 10px 25px rgba(255,77,109,0.4); }
        }

        /* Ігровий інтерфейс */
        #game-layout {
            display: none; flex-direction: column; align-items: center;
            transform: translateY(-20px);
        }

        .stats-panel {
            display: flex; justify-content: space-between; width: 340px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 12px 25px; margin-bottom: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: #fff; text-shadow: 0 2px 10px rgba(255,255,255,0.3); margin-top: 4px; }

        /* Поле гри */
        #game-board {
            position: relative; width: 360px; height: 540px;
            background: rgba(0, 0, 0, 0.4); border-radius: 24px;
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 20px 50px rgba(0,0,0,0.6);
            overflow: hidden; touch-action: none;
            transition: transform 0.1s;
        }

        /* Візуальна тактильна віддача (трясучка) */
        .shake-board { animation: hardShake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes hardShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px) rotate(-1deg); }
            40% { transform: translateX(5px) rotate(1deg); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(2px); }
        }

        /* 3D Сердечка */
        .heart-item {
            position: absolute; width: 45px; height: 45px;
            background-size: 85% 85%;
            background-position: center;
            background-repeat: no-repeat;
            filter: drop-shadow(0px 8px 5px rgba(0,0,0,0.6));
            transition: top 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        left 0.25s ease-out, 
                        transform 0.15s ease, 
                        opacity 0.25s ease;
            cursor: pointer;
        }
        .heart-item:active { transform: scale(0.85); filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.8)); }

        /* Ефекти ульти */
        .particle {
            position: absolute; pointer-events: none;
            background-size: contain; background-repeat: no-repeat;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
            animation: explode 0.8s forwards cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(180deg); opacity: 0; }
        }

        #ult-overlay {
            position: absolute; inset: 0; background: rgba(255,255,255,0);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; pointer-events: none; transition: background 0.3s;
        }
        #ult-heart {
            width: 0px; height: 0px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            filter: drop-shadow(0 20px 30px rgba(255,77,109,0.8));
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body>

    <div id="welcome-panel" class="cli-container">
        <div id="cli-box" class="cli-text"></div>
        <button id="btn-action" class="btn-glow" onclick="handleMainAction()">Натисни, щоб посилити магію ❤️</button>
    </div>

    <div id="game-layout">
        <div class="stats-panel">
            <div class="stat-item">
                <div class="stat-label">Очки</div>
                <div id="score-val" class="stat-value" style="color: #ff758c;">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Час</div>
                <div id="timer-val" class="stat-value">60</div>
            </div>
        </div>
        <div id="game-board">
            <div id="ult-overlay"><div id="ult-heart"></div></div>
        </div>
    </div>

<script>
    // --- ГЕНЕРАТОР РЕАЛІСТИЧНИХ 3D СЕРДЕЦЬ (SVG Data URIs) ---
    // Створює об'ємне скло/льодяник з відблиском світла
    function create3DHeart(mainColor, darkColor) {
        const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <defs>
                <radialGradient id="grad" cx="30%" cy="25%" r="75%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
                    <stop offset="15%" stop-color="${mainColor}"/>
                    <stop offset="75%" stop-color="${darkColor}"/>
                    <stop offset="100%" stop-color="#000000" stop-opacity="0.9"/>
                </radialGradient>
            </defs>
            <path d="M50 90 C 50 90 10 60 10 30 C 10 10 35 5 50 25 C 65 5 90 10 90 30 C 90 60 50 90 50 90 Z" fill="url(#grad)"/>
            <path d="M 22 28 C 22 15 35 12 50 22 C 38 18 28 22 22 28 Z" fill="#ffffff" opacity="0.6"/>
        </svg>`;
        return `url("data:image/svg+xml;charset=utf-8,${encodeURIComponent(svgStr)}")`;
    }

    const gemStyles = {
        red: create3DHeart('#ff4d6d', '#8a0021'),
        blue: create3DHeart('#00b4d8', '#003d5c'),
        purple: create3DHeart('#9d4edd', '#3c096c'),
        orange: create3DHeart('#ff9e00', '#cc5500'),
        green: create3DHeart('#52b788', '#1b4332')
    };
    const colorKeys = Object.keys(gemStyles);

    // --- ТАКТИЛЬНА ВІДДАЧА ---
    function triggerHaptic(type) {
        // Вібрація (працює на Android)
        if (navigator.vibrate) {
            if (type === 'success') navigator.vibrate(2); // Чіткий мікро-клік
            if (type === 'fail') navigator.vibrate([15, 40, 15]); // Подвійний удар
            if (type === 'ult') navigator.vibrate([50, 50, 100, 50, 200]); // Потужна вібрація
        }

        // Візуальний зворотний зв'язок (працює всюди, ідеально для iPhone)
        if (type === 'fail') {
            const board = document.getElementById('game-board');
            board.classList.remove('shake-board');
            void board.offsetWidth; // Тригер рефлоу для перезапуску анімації
            board.classList.add('shake-board');
        }
    }

    // --- ДРУК ТЕКСТУ ---
    const phrase = "Я тебе кохаю манюня";
    let charIndex = 0;
    function typeCLI() {
        const box = document.getElementById('cli-box');
        if (charIndex < phrase.length) {
            box.innerHTML = phrase.substring(0, charIndex + 1) + '<span class="cursor">_</span>';
            charIndex++;
            setTimeout(typeCLI, 120);
        } else {
            box.innerHTML = phrase + '<span class="cursor">_</span>';
            const btn = document.getElementById('btn-action');
            btn.innerText = 'Грати в "Сердечка"';
            btn.style.display = 'block';
        }
    }

    function handleMainAction() {
        const btn = document.getElementById('btn-action');
        if (btn.innerText.includes("магію")) {
            btn.style.display = 'none';
            typeCLI();
        } else {
            document.getElementById('welcome-panel').style.display = 'none';
            document.getElementById('game-layout').style.display = 'flex';
            setupGame();
        }
    }

    // --- ЛОГІКА ГРИ ---
    const ROWS = 12, COLS = 8, CELL = 45;
    let board = [], isLocked = false, dragStart = null;
    let score = 0, timeLeft = 60, gameTimer = null;

    function setupGame() {
        document.getElementById('ult-heart').style.backgroundImage = gemStyles.red;
        const container = document.getElementById('game-board');
        for (let r = 0; r < ROWS; r++) {
            board[r] = [];
            for (let c = 0; c < COLS; c++) {
                spawnGem(r, c, false);
            }
        }
        cleanInitialMatches();
        renderBoard();
        initControls();
        
        gameTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-val').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(gameTimer);
                setTimeout(() => {
                    alert(`Час вийшов! Твій результат: ${score}`);
                    location.reload();
                }, 100);
            }
        }, 1000);
    }

    function spawnGem(r, c, isRain) {
        const type = colorKeys[Math.floor(Math.random() * colorKeys.length)];
        const el = document.createElement('div');
        el.className = 'heart-item';
        el.style.backgroundImage = gemStyles[type];

        if (isRain) {
            el.style.top = `${-Math.random() * 300 - 100}px`;
        } else {
            el.style.top = `${r * CELL}px`;
        }
        el.style.left = `${c * CELL}px`;
        
        document.getElementById('game-board').appendChild(el);
        board[r][c] = { type, element: el };
        
        if (isRain) {
            // Легкий ефект відскоку при падінні
            setTimeout(() => { el.style.top = `${r * CELL}px`; }, 20);
        }
    }

    function renderBoard() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    board[r][c].element.style.top = `${r * CELL}px`;
                    board[r][c].element.style.left = `${c * CELL}px`;
                }
            }
        }
    }

    function cleanInitialMatches() {
        let hasMatches = true;
        while (hasMatches) {
            hasMatches = false;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if ((c < COLS - 2 && board[r][c].type === board[r][c+1].type && board[r][c].type === board[r][c+2].type) ||
                        (r < ROWS - 2 && board[r][c].type === board[r+1][c].type && board[r][c].type === board[r+2][c].type)) {
                        board[r][c].type = colorKeys[(colorKeys.indexOf(board[r][c].type) + 1) % colorKeys.length];
                        board[r][c].element.style.backgroundImage = gemStyles[board[r][c].type];
                        hasMatches = true;
                    }
                }
            }
        }
    }

    function initControls() {
        const g = document.getElementById('game-board');
        const getCoord = (e) => {
            const r = g.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { c: Math.floor((clientX - r.left) / CELL), r: Math.floor((clientY - r.top) / CELL) };
        };

        const start = (e) => { if (isLocked) return; dragStart = getCoord(e); };
        const move = (e) => {
            if (!dragStart || isLocked) return;
            const curr = getCoord(e);
            const dr = curr.r - dragStart.r, dc = curr.c - dragStart.c;
            if (Math.abs(dr) + Math.abs(dc) === 1) {
                swapGems(dragStart, curr);
                dragStart = null;
            }
        };

        g.addEventListener('mousedown', start); g.addEventListener('mousemove', move);
        g.addEventListener('touchstart', start, {passive:true}); g.addEventListener('touchmove', move, {passive:true});
    }

    async function swapGems(p1, p2) {
        if (p1.r < 0 || p1.r >= ROWS || p1.c < 0 || p1.c >= COLS || p2.r < 0 || p2.r >= ROWS || p2.c < 0 || p2.c >= COLS) return;
        isLocked = true;

        let g1 = board[p1.r][p1.c], g2 = board[p2.r][p2.c];
        board[p1.r][p1.c] = g2; board[p2.r][p2.c] = g1;
        renderBoard();

        await new Promise(r => setTimeout(r, 250));

        if (!await checkMatches()) {
            triggerHaptic('fail');
            board[p1.r][p1.c] = g1; board[p2.r][p2.c] = g2;
            renderBoard();
            await new Promise(r => setTimeout(r, 200));
            isLocked = false;
        }
    }

    async function checkMatches() {
        let matched = false;
        let destroyGrid = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS - 2; c++) {
                if (board[r][c] && board[r][c+1] && board[r][c+2] && board[r][c].type === board[r][c+1].type && board[r][c].type === board[r][c+2].type) {
                    destroyGrid[r][c] = destroyGrid[r][c+1] = destroyGrid[r][c+2] = true; matched = true;
                }
            }
        }
        for (let c = 0; c < COLS; c++) {
            for (let r = 0; r < ROWS - 2; r++) {
                if (board[r][c] && board[r+1][c] && board[r+2][c] && board[r][c].type === board[r+1][c].type && board[r][c].type === board[r+2][c].type) {
                    destroyGrid[r][c] = destroyGrid[r+1][c] = destroyGrid[r+2][c] = true; matched = true;
                }
            }
        }

        if (!matched) return false;

        let visited = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
        let isUltActive = false;

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (destroyGrid[r][c] && !visited[r][c]) {
                    let cluster = [];
                    getCluster(r, c, board[r][c].type, destroyGrid, visited, cluster);
                    if (cluster.length >= 5 && cluster[0].type === 'red') {
                        isUltActive = true;
                    }
                }
            }
        }

        if (isUltActive) {
            triggerHaptic('ult');
            await runUltimate();
        } else {
            triggerHaptic('success');
            await dissolveGems(destroyGrid);
        }
        return true;
    }

    function getCluster(r, c, type, destroyGrid, visited, cluster) {
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS || visited[r][c] || !destroyGrid[r][c] || board[r][c].type !== type) return;
        visited[r][c] = true;
        cluster.push({ r, c, type: board[r][c].type });
        getCluster(r+1, c, type, destroyGrid, visited, cluster);
        getCluster(r-1, c, type, destroyGrid, visited, cluster);
        getCluster(r, c+1, type, destroyGrid, visited, cluster);
        getCluster(r, c-1, type, destroyGrid, visited, cluster);
    }

    async function dissolveGems(destroyGrid) {
        let count = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (destroyGrid[r][c] && board[r][c]) {
                    count++;
                    const el = board[r][c].element;
                    el.style.transform = `scale(0)`;
                    el.style.opacity = '0';
                    setTimeout(((target) => () => target.remove())(el), 250);
                    board[r][c] = null;
                }
            }
        }
        updateScore(count * 10);
        await new Promise(r => setTimeout(r, 200));
        await applyGravity();
    }

    async function runUltimate() {
        const overlay = document.getElementById('ult-overlay');
        const uHeart = document.getElementById('ult-heart');
        
        overlay.style.background = 'rgba(255,255,255,0.2)';
        uHeart.style.width = '200px'; uHeart.style.height = '200px';

        await new Promise(r => setTimeout(r, 500));
        uHeart.style.transform = 'scale(0)';
        overlay.style.background = 'rgba(255,255,255,0)';

        const boardEl = document.getElementById('game-board');
        for (let i = 0; i < 60; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = '20px'; p.style.height = '20px';
            p.style.backgroundImage = gemStyles[colorKeys[Math.floor(Math.random() * colorKeys.length)]];
            p.style.left = '50%'; p.style.top = '50%';
            p.style.setProperty('--tx', `${(Math.random() - 0.5) * 500}px`);
            p.style.setProperty('--ty', `${(Math.random() - 0.5) * 700}px`);
            boardEl.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        let totalGems = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    totalGems++;
                    board[r][c].element.remove();
                    board[r][c] = null;
                }
            }
        }

        updateScore(totalGems * 15);
        uHeart.style.width = '0px'; uHeart.style.height = '0px'; uHeart.style.transform = 'scale(1)';

        await new Promise(r => setTimeout(r, 300));
        
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                spawnGem(r, c, true);
            }
        }
        await new Promise(r => setTimeout(r, 500));
        await checkMatches();
    }

    async function applyGravity() {
        for (let c = 0; c < COLS; c++) {
            let empty = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r][c] === null) { empty++; }
                else if (empty > 0) {
                    board[r + empty][c] = board[r][c];
                    board[r][c] = null;
                }
            }
            for (let i = 0; i < empty; i++) {
                spawnGem(i, c, true);
            }
        }
        renderBoard();
        await new Promise(r => setTimeout(r, 400));
        if (!await checkMatches()) { isLocked = false; }
    }

    function updateScore(amount) {
        score += amount;
        const sv = document.getElementById('score-val');
        sv.innerText = score;
        sv.style.transform = 'scale(1.2)';
        setTimeout(() => sv.style.transform = 'scale(1)', 150);
    }
</script>
</body>
</html>
