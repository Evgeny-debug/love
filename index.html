<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мінімалістична Ігрова Кімната</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ff4d6d;
            --success: #20c997;
            --warning: #ff922b;
            --text: #f8f9fa;
        }
        * { box-sizing: border-box; touch-action: none; user-select: none; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .glass { background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; }
        .btn { padding: 16px 32px; border: 1px solid var(--glass-border); border-radius: 16px; background: var(--glass); color: white; cursor: pointer; margin: 8px; width: 85%; max-width: 320px; font-size: 16px; font-weight: 600; letter-spacing: 0.5px; transition: 0.2s ease; }
        .btn:active { background: var(--accent); transform: scale(0.95); }
        
        #app { width: 100%; max-width: 450px; height: 100%; position: relative; background: radial-gradient(circle at top right, #1a0a0d, #0a0a0a); }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        .screen.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2 { color: var(--text); margin-bottom: 24px; font-weight: 300; letter-spacing: 1px; }
        .accent-text { color: var(--accent); font-weight: 600; }
        
        /* UI Elements */
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 10; pointer-events: none; }
        .hud-stats { display: flex; justify-content: space-between; font-size: 18px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }
        
        .nav-bottom { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; z-index: 10; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px 24px; border-radius: 20px; backdrop-filter: blur(5px); font-size: 14px; cursor: pointer; }
        
        /* Match 3 */
        #match3-board { display: grid; gap: 6px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 20px; border: 1px solid var(--glass-border); margin-top: 40px; }
        .gem { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 28px; border-radius: 12px; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s, top 0.3s ease; position: relative; }
        .gem.selected { transform: scale(1.15); box-shadow: 0 0 15px rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); z-index: 2; }
        .gem.popping { transform: scale(0); opacity: 0; }

        /* Canvas Games */
        .canvas-container { width: 100%; height: 100%; position: absolute; inset: 0; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        .overlay { position: absolute; inset: 0; background: rgba(10,10,10,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 20; text-align: center; padding: 20px; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }
    </style>
</head>
<body>
    <div id="app">
        <div id="screen-menu" class="screen active">
            <h1 style="font-size: 32px;">Ігрова <span class="accent-text">Кімната</span></h1>
            <p style="margin-bottom: 40px; color: #888; font-size: 14px;">Обери гру</p>
            <button class="btn" onclick="App.open('helix')">🌀 Спіраль (Рівні)</button>
            <button class="btn" onclick="App.open('match3')">💎 Три в ряд</button>
        </div>

        <div id="screen-match3" class="screen">
            <div class="top-bar">
                <div class="hud-stats">
                    <span>Рівень <span id="m3-lvl" class="accent-text">1</span></span>
                    <span><span id="m3-score">0</span> / <span id="m3-target" style="color:#888">100</span></span>
                </div>
                <div class="progress-container"><div class="progress-bar" id="m3-progress"></div></div>
            </div>
            <div id="match3-board"></div>
            <div class="nav-bottom"><button class="nav-btn" onclick="App.open('menu')">← Назад</button></div>
            
            <div id="m3-overlay" class="overlay">
                <h2 id="m3-msg">Рівень пройдено!</h2>
                <button class="btn" onclick="Match3.nextLevel()">Далі</button>
            </div>
        </div>

        <div id="screen-helix" class="screen">
            <div class="canvas-container">
                <canvas id="helix-canvas"></canvas>
            </div>
            <div class="top-bar">
                <div class="hud-stats">
                    <span>Рівень <span id="hx-lvl" class="accent-text">1</span></span>
                    <span id="hx-lives">💖💖💖</span>
                </div>
                <div class="progress-container"><div class="progress-bar" id="hx-progress"></div></div>
            </div>
            <div class="nav-bottom"><button class="nav-btn" onclick="App.open('menu')">← Назад</button></div>
            
            <div id="hx-overlay" class="overlay">
                <h2 id="hx-msg">Кінець гри</h2>
                <p style="color: #888; margin-bottom: 20px;">Рахунок: <span id="hx-score" class="accent-text">0</span></p>
                <button class="btn" id="hx-btn" onclick="Helix.startLevel()">Спробувати ще</button>
            </div>
        </div>
    </div>

    <script>
        // --- ЗАГАЛЬНЕ ---
        const App = {
            shake() {
                const appElem = document.getElementById('app');
                appElem.classList.remove('shake');
                void appElem.offsetWidth;
                appElem.classList.add('shake');
            },
            open(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('screen-' + id).classList.add('active');
                if(window.Helix && window.Helix.stop) Helix.stop();
                if (id === 'match3') Match3.init();
                if (id === 'helix') Helix.init();
            }
        };

        // --- ТРИ В РЯД (РІВНІ ТА ФІЗИКА) ---
        const Match3 = {
            cols: 6, rows: 6, grid: [], score: 0, level: 1, target: 150,
            emojis: ['💖', '🌸', '💎', '🍓', '✨'],
            selected: null, isAnimating: false,
            
            init() {
                this.level = 1; this.startLevel();
                const board = document.getElementById('match3-board');
                board.style.gridTemplateColumns = `repeat(${this.cols}, 42px)`;
                
                let startX = 0, startY = 0;
                board.ontouchstart = (e) => { if(e.target.classList.contains('gem')) { startX = e.touches[0].clientX; startY = e.touches[0].clientY; this.selectGem(e.target.dataset.r, e.target.dataset.c); } };
                board.ontouchmove = (e) => {
                    if(!this.selected || this.isAnimating) return;
                    e.preventDefault();
                    let dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
                    if(Math.abs(dx) > 25 || Math.abs(dy) > 25) {
                        let tr = parseInt(this.selected.r), tc = parseInt(this.selected.c);
                        if(Math.abs(dx) > Math.abs(dy)) tc += dx > 0 ? 1 : -1; else tr += dy > 0 ? 1 : -1;
                        if(tr >= 0 && tr < this.rows && tc >= 0 && tc < this.cols) this.attemptSwap(this.selected.r, this.selected.c, tr, tc);
                        this.selected = null;
                    }
                };
            },
            startLevel() {
                this.score = 0;
                this.target = 100 + (this.level * 50);
                document.getElementById('m3-lvl').innerText = this.level;
                document.getElementById('m3-target').innerText = this.target;
                document.getElementById('m3-overlay').classList.remove('active');
                this.updateUI();
                this.grid = Array.from({length: this.rows}, () => Array(this.cols).fill(null));
                this.fillBoard();
            },
            nextLevel() { this.level++; this.startLevel(); },
            fillBoard() {
                for(let r=0; r<this.rows; r++) {
                    for(let c=0; c<this.cols; c++) {
                        if(!this.grid[r][c]) this.grid[r][c] = this.emojis[Math.floor(Math.random() * this.emojis.length)];
                    }
                }
                this.render();
                if(this.findMatches().length > 0) { this.isAnimating = true; setTimeout(() => this.checkMatches(), 300); }
                else { this.isAnimating = false; }
            },
            render() {
                const board = document.getElementById('match3-board');
                board.innerHTML = '';
                for(let r=0; r<this.rows; r++) {
                    for(let c=0; c<this.cols; c++) {
                        let cell = document.createElement('div');
                        cell.className = 'gem'; cell.dataset.r = r; cell.dataset.c = c;
                        cell.innerText = this.grid[r][c] || '';
                        if(this.selected && this.selected.r == r && this.selected.c == c) cell.classList.add('selected');
                        cell.onmousedown = () => this.selectGem(r, c);
                        board.appendChild(cell);
                    }
                }
            },
            selectGem(r, c) {
                if(this.isAnimating) return;
                r = parseInt(r); c = parseInt(c);
                if(!this.selected) { this.selected = {r, c}; this.render(); }
                else this.attemptSwap(this.selected.r, this.selected.c, r, c);
            },
            attemptSwap(r1, c1, r2, c2) {
                if((Math.abs(r1-r2)===1 && c1===c2) || (Math.abs(c1-c2)===1 && r1===r2)) {
                    this.isAnimating = true;
                    let t = this.grid[r2][c2]; this.grid[r2][c2] = this.grid[r1][c1]; this.grid[r1][c1] = t;
                    this.selected = null; this.render();
                    setTimeout(() => {
                        if(this.findMatches().length > 0) this.checkMatches();
                        else {
                            let t = this.grid[r2][c2]; this.grid[r2][c2] = this.grid[r1][c1]; this.grid[r1][c1] = t;
                            this.render(); this.isAnimating = false;
                        }
                    }, 250);
                } else { this.selected = {r: r2, c: c2}; this.render(); }
            },
            findMatches() {
                let m = [];
                for(let r=0; r<this.rows; r++) for(let c=0; c<this.cols-2; c++) 
                    if(this.grid[r][c] && this.grid[r][c]==this.grid[r][c+1] && this.grid[r][c]==this.grid[r][c+2]) m.push({r,c},{r,c:c+1},{r,c:c+2});
                for(let c=0; c<this.cols; c++) for(let r=0; r<this.rows-2; r++) 
                    if(this.grid[r][c] && this.grid[r][c]==this.grid[r+1][c] && this.grid[r][c]==this.grid[r+2][c]) m.push({r,c},{r:r+1,c},{r:r+2,c});
                return m.filter((v,i,a)=>a.findIndex(t=>(t.r===v.r && t.c===v.c))===i);
            },
            checkMatches() {
                let m = this.findMatches();
                if(m.length > 0) {
                    const cells = document.querySelectorAll('.gem');
                    m.forEach(p => { if(cells[p.r*this.cols+p.c]) cells[p.r*this.cols+p.c].classList.add('popping'); this.grid[p.r][p.c] = null; this.score += 10; });
                    this.updateUI();
                    setTimeout(() => this.applyGravity(), 300);
                } else { this.isAnimating = false; }
            },
            applyGravity() {
                for(let c=0; c<this.cols; c++) {
                    for(let r=this.rows-1; r>=0; r--) {
                        if(this.grid[r][c] === null) {
                            for(let k=r-1; k>=0; k--) {
                                if(this.grid[k][c] !== null) { this.grid[r][c] = this.grid[k][c]; this.grid[k][c] = null; break; }
                            }
                        }
                    }
                }
                this.fillBoard();
            },
            updateUI() {
                document.getElementById('m3-score').innerText = this.score;
                let pct = Math.min(100, (this.score / this.target) * 100);
                document.getElementById('m3-progress').style.width = pct + '%';
                if(this.score >= this.target) {
                    this.isAnimating = true;
                    setTimeout(() => {
                        document.getElementById('m3-msg').innerText = `Рівень ${this.level} пройдено!`;
                        document.getElementById('m3-overlay').classList.add('active');
                    }, 500);
                }
            }
        };

        // --- HELIX JUMP (СЕКТОРИ, РІВНІ, ЛОГІКА) ---
        const Helix = {
            canvas: null, ctx: null, raf: null,
            w: 0, h: 0, rotation: 0, targetRotation: 0,
            ball: { y: 0, vy: 0, radius: 12, isInvincible: false }, 
            rings: [], level: 1, score: 0, lives: 3, state: 'stopped',
            isDragging: false, lastX: 0, totalRings: 0, ringsPassed: 0,
            
            colors: { white: '#e9ecef', red: '#ff4d6d', green: '#20c997', orange: '#ff922b', orange2: '#fcc419', finish: '#6741d9' },

            init() {
                this.canvas = document.getElementById('helix-canvas');
                this.ctx = this.canvas.getContext('2d');
                let rect = this.canvas.parentElement.getBoundingClientRect();
                this.w = this.canvas.width = rect.width; this.h = this.canvas.height = rect.height;
                
                const onMove = (e, clientX) => {
                    if(!this.isDragging || this.state !== 'play') return;
                    if(e) e.preventDefault();
                    this.targetRotation += (clientX - this.lastX) * 0.02; 
                    this.lastX = clientX;
                };
                
                this.canvas.ontouchstart = (e) => { this.isDragging = true; this.lastX = e.touches[0].clientX; };
                this.canvas.ontouchmove = (e) => onMove(e, e.touches[0].clientX);
                this.canvas.ontouchend = () => this.isDragging = false;
                
                this.canvas.onpointerdown = (e) => { this.isDragging = true; this.lastX = e.clientX; };
                this.canvas.onpointermove = (e) => onMove(null, e.clientX);
                this.canvas.onpointerup = () => this.isDragging = false;
                
                this.level = 1; this.score = 0;
                this.startLevel();
            },
            
            startLevel() {
                document.getElementById('hx-overlay').classList.remove('active');
                this.lives = 3; this.ringsPassed = 0; this.state = 'play';
                this.rotation = 0; this.targetRotation = 0;
                this.ball = { y: this.h * 0.3, vy: 0, radius: 12, isInvincible: false };
                this.totalRings = 10 + (this.level - 1) * 5; // Збільшення кількості кілець
                
                this.rings = [];
                for(let i=0; i<this.totalRings; i++) this.addRing(this.h * 0.5 + i * 140, i, false);
                this.addRing(this.h * 0.5 + this.totalRings * 140, this.totalRings, true); // Фініш
                
                this.updateUI();
                if(!this.raf) this.loop();
            },
            
            addRing(y, index, isFinish) {
                let segments = [];
                if(isFinish) {
                    segments.push({ start: 0, end: Math.PI*2, type: 'finish' });
                } else {
                    let numSlices = 6; let sliceAngle = (Math.PI*2) / numSlices;
                    let hasGapOrGreen = false;
                    let redProb = Math.min(0.5, 0.1 + (this.level * 0.05));
                    
                    for(let i=0; i<numSlices; i++) {
                        let start = i * sliceAngle; let end = start + sliceAngle;
                        let type = 'white';
                        let r = Math.random();
                        
                        if(i === numSlices-1 && !hasGapOrGreen) type = Math.random()>0.5 ? 'gap' : 'green';
                        else if(r < 0.15) { type = 'gap'; hasGapOrGreen = true; }
                        else if(r < 0.3) { type = 'green'; hasGapOrGreen = true; }
                        else if(r < 0.3 + redProb && index > 0) type = 'red';
                        else if(r < 0.4 + redProb && index > 1) type = 'orange';

                        segments.push({ start, end, type, hits: type === 'orange' ? 2 : 0 });
                    }
                    
                    // Генерація сердечка (якщо 1 життя)
                    let heartAngle = null;
                    if(this.lives === 1 && Math.random() < 0.3) {
                        let safeSegs = segments.filter(s => s.type === 'white' || s.type === 'green');
                        if(safeSegs.length > 0) {
                            let s = safeSegs[Math.floor(Math.random() * safeSegs.length)];
                            heartAngle = s.start + (s.end - s.start)/2;
                        }
                    }
                    this.rings.push({ y, segments, passed: false, heartAngle });
                    return;
                }
                this.rings.push({ y, segments, passed: false, heartAngle: null });
            },

            updateUI() {
                document.getElementById('hx-lvl').innerText = this.level;
                document.getElementById('hx-lives').innerText = '💖'.repeat(this.lives);
                let pct = (this.ringsPassed / this.totalRings) * 100;
                document.getElementById('hx-progress').style.width = `${pct}%`;
                document.getElementById('hx-score').innerText = this.score;
            },

            loop() {
                if(this.state !== 'play') return;
                this.update(); this.draw();
                this.raf = requestAnimationFrame(() => this.loop());
            },

            update() {
                this.rotation += (this.targetRotation - this.rotation) * 0.3;
                
                // Гравітація (росте з рівнем)
                let grav = 0.5 + Math.min(0.2, this.level * 0.02);
                this.ball.vy += grav; 
                this.ball.y += this.ball.vy;
                
                // Камера
                let targetCamY = this.h * 0.4;
                if(this.ball.y > targetCamY) {
                    let diff = this.ball.y - targetCamY;
                    this.ball.y = targetCamY;
                    this.rings.forEach(r => r.y -= diff);
                }

                // Колізії
                for(let i=0; i<this.rings.length; i++) {
                    let r = this.rings[i];
                    let hitY = r.y;

                    if(this.ball.y + this.ball.radius >= hitY && this.ball.y - this.ball.vy <= hitY) {
                        if(r.passed) continue;

                        // Визначаємо кут кульки відносно повернутого кільця
                        let ballAngle = (Math.PI/2 - this.rotation) % (Math.PI*2);
                        if(ballAngle < 0) ballAngle += Math.PI*2;

                        let hitSeg = null;
                        for(let s of r.segments) {
                            if(ballAngle >= s.start && ballAngle <= s.end) { hitSeg = s; break; }
                        }

                        if(hitSeg) {
                            // Перевірка на сердечко
                            if(r.heartAngle !== null) {
                                let dist = Math.abs(ballAngle - r.heartAngle);
                                if(dist < 0.4 || dist > Math.PI*2 - 0.4) {
                                    this.lives = Math.min(3, this.lives + 1);
                                    r.heartAngle = null;
                                    this.updateUI();
                                }
                            }

                            if(hitSeg.type === 'gap') {
                                this.passRing(r);
                            } else if (hitSeg.type === 'green') {
                                this.passRing(r);
                            } else if (hitSeg.type === 'red' && !this.ball.isInvincible) {
                                this.lives--; App.shake(); this.updateUI();
                                if(this.lives <= 0) return this.endGame(false);
                                this.bounce(hitY, true);
                            } else if (hitSeg.type === 'orange') {
                                hitSeg.hits--;
                                if(hitSeg.hits <= 0) this.passRing(r);
                                else { hitSeg.type = 'orange2'; this.bounce(hitY, false); }
                            } else if (hitSeg.type === 'finish') {
                                this.endGame(true);
                            } else {
                                // White or Invincible Red
                                this.bounce(hitY, false);
                            }
                        } else {
                            // Fail-safe (якщо на межі секторів)
                            this.bounce(hitY, false);
                        }
                    }
                }
            },

            bounce(hitY, high) {
                this.ball.y = hitY - this.ball.radius;
                this.ball.vy = high ? -12 : -8;
                if(high) { this.ball.isInvincible = true; setTimeout(()=>this.ball.isInvincible=false, 1000); }
            },

            passRing(ring) {
                ring.passed = true;
                this.ringsPassed++;
                this.score += 10;
                this.updateUI();
            },

            draw() {
                this.ctx.clearRect(0, 0, this.w, this.h);
                let cx = this.w / 2; let R = 85; let thick = 15;

                // Малюємо кільця (тільки видимі)
                for (let r of this.rings) {
                    if(r.passed || r.y < -50 || r.y > this.h + 50) continue;

                    for(let s of r.segments) {
                        if(s.type === 'gap') continue;
                        
                        this.ctx.beginPath();
                        this.ctx.arc(cx, r.y, R, s.start + this.rotation, s.end + this.rotation);
                        this.ctx.lineWidth = thick;
                        this.ctx.strokeStyle = this.colors[s.type] || this.colors.white;
                        this.ctx.stroke();
                        
                        // Розділювачі між секторами
                        this.ctx.lineWidth = 2; this.ctx.strokeStyle = '#0a0a0a';
                        this.ctx.stroke();
                    }
                    
                    // Малюємо життя
                    if(r.heartAngle !== null) {
                        let hx = cx + R * Math.cos(r.heartAngle + this.rotation);
                        let hy = r.y + R * Math.sin(r.heartAngle + this.rotation) - 15;
                        this.ctx.font = "20px Arial"; this.ctx.fillText("💖", hx-10, hy+5);
                    }
                }

                // Центральний стовп
                this.ctx.fillStyle = '#222';
                this.ctx.fillRect(cx - 15, 0, 30, this.h);

                // Сердечко (М'ячик)
                this.ctx.save();
                this.ctx.translate(cx, this.ball.y - 15);
                let stretch = Math.max(0.7, 1 - this.ball.vy * 0.03);
                this.ctx.scale(1/stretch, stretch);
                this.ctx.font = "30px Arial";
                this.ctx.textAlign = "center"; this.ctx.textBaseline = "middle";
                if(this.ball.isInvincible && Math.floor(Date.now()/100)%2===0) this.ctx.globalAlpha = 0.5;
                this.ctx.shadowBlur = 15; this.ctx.shadowColor = '#ff4d6d';
                this.ctx.fillText("💖", 0, 0);
                this.ctx.restore();
            },

            endGame(win) {
                this.state = 'stopped';
                let msg = document.getElementById('hx-msg');
                let btn = document.getElementById('hx-btn');
                
                if(win) {
                    msg.innerText = "Рівень пройдено! 🎉";
                    msg.style.color = "var(--success)";
                    this.level++;
                    btn.innerText = "Наступний рівень";
                } else {
                    msg.innerText = "Впала... 💔";
                    msg.style.color = "var(--accent)";
                    btn.innerText = "Спробувати ще";
                }
                
                document.getElementById('hx-score').innerText = this.score;
                document.getElementById('hx-overlay').classList.add('active');
            }
        };
    </script>
</body>
</html>
