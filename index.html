<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mega Game Engine 4.0</title>
    <style>
        :root {
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #ff2a55;
            --success: #00e676;
            --warning: #ff9100;
            --combo: #00d4ff;
            --text: #ffffff;
        }
        * { box-sizing: border-box; touch-action: none; user-select: none; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #app { width: 100%; max-width: 420px; height: 100%; position: relative; background: radial-gradient(circle at 50% 0%, #1a0b12 0%, #050508 100%); overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; inset: 0; }
        .screen.active { display: flex; animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .btn { padding: 18px 32px; border: 1px solid var(--glass-border); border-radius: 20px; background: rgba(255,255,255,0.05); color: white; cursor: pointer; margin: 10px; width: 85%; max-width: 300px; font-size: 17px; font-weight: 600; transition: all 0.2s; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn:active { background: var(--accent); transform: scale(0.92); }
        
        .title { font-size: 38px; font-weight: 800; margin-bottom: 10px; background: linear-gradient(45deg, #ff2a55, #ff758c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* UI Elements */
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 25px 20px 15px; display: flex; flex-direction: column; gap: 12px; z-index: 10; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .hud-stats { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #ff758c); width: 0%; transition: width 0.3s ease; }
        
        .nav-bottom { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center; z-index: 10; }
        .nav-btn { background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #ccc; padding: 12px 28px; border-radius: 25px; font-size: 14px; cursor: pointer; transition: 0.2s; pointer-events: auto; }
        .nav-btn:active { background: #333; color: white; }

        .combo-text { position: absolute; top: 100px; left: 50%; transform: translateX(-50%) scale(0); font-size: 32px; font-weight: 900; color: var(--combo); text-shadow: 0 0 15px var(--combo); opacity: 0; transition: 0.2s; z-index: 5; pointer-events: none; }
        .combo-text.active { transform: translateX(-50%) scale(1); opacity: 1; animation: pulseCombo 0.5s infinite alternate; }
        @keyframes pulseCombo { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.1); } }

        /* Match 3 (Оптимизированная сетка) */
        #match3-wrapper { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 24px; border: 1px solid var(--glass-border); margin-top: 20px; pointer-events: auto; }
        #match3-board { display: grid; gap: 6px; position: relative; touch-action: none; }
        .gem { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 30px; border-radius: 12px; transition: transform 0.2s, opacity 0.2s; user-select: none; will-change: transform; }
        .gem.selected { transform: scale(1.2); z-index: 2; box-shadow: 0 0 20px rgba(255,255,255,0.3); background: rgba(255,255,255,0.15); }
        .gem.popping { transform: scale(0) rotate(45deg); opacity: 0; }

        /* Canvas */
        .canvas-container { position: absolute; inset: 0; pointer-events: auto; }
        canvas { display: block; width: 100%; height: 100%; }
        
        .overlay { position: absolute; inset: 0; background: rgba(5,5,8,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 20; backdrop-filter: blur(5px); }
        .overlay.active { opacity: 1; pointer-events: auto; }
        
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; transform: translate3d(0, 0, 0); backface-visibility: hidden; perspective: 1000px; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }
    </style>
</head>
<body>
    <div id="app">
        <div id="screen-menu" class="screen active">
            <div class="title">Ігрова Кімната</div>
            <p style="margin-bottom: 40px; color: #888; letter-spacing: 1px;">MEGA ENGINE V4</p>
            <button class="btn" onclick="App.open('helix')">🌀 Спіраль (Комбо)</button>
            <button class="btn" onclick="App.open('match3')">💎 Три в ряд</button>
        </div>

        <div id="screen-match3" class="screen">
            <div class="top-bar">
                <div class="hud-stats">
                    <span>Рівень <span id="m3-lvl" style="color:var(--accent)">1</span></span>
                    <span><span id="m3-score">0</span> / <span id="m3-target" style="color:#888">100</span></span>
                </div>
                <div class="progress-container"><div class="progress-bar" id="m3-progress"></div></div>
            </div>
            
            <div id="match3-wrapper"><div id="match3-board"></div></div>
            <div class="nav-bottom"><button class="nav-btn" onclick="App.open('menu')">В Меню</button></div>
            
            <div id="m3-overlay" class="overlay">
                <h2 id="m3-msg" style="font-size: 32px; margin-bottom: 20px;">Рівень пройдено! 🎉</h2>
                <button class="btn" onclick="Match3.nextLevel()">Наступний рівень</button>
            </div>
        </div>

        <div id="screen-helix" class="screen">
            <div class="canvas-container"><canvas id="helix-canvas"></canvas></div>
            <div class="top-bar">
                <div class="hud-stats">
                    <span>Рівень <span id="hx-lvl" style="color:var(--accent)">1</span></span>
                    <span id="hx-lives" style="letter-spacing: 2px;">💖💖💖</span>
                </div>
                <div class="progress-container"><div class="progress-bar" id="hx-progress"></div></div>
            </div>
            
            <div id="hx-combo" class="combo-text">COMBO x2!</div>
            <div class="nav-bottom"><button class="nav-btn" onclick="App.open('menu')">В Меню</button></div>
            
            <div id="hx-overlay" class="overlay">
                <h2 id="hx-msg" style="font-size: 36px; margin-bottom: 10px;">Кінець гри</h2>
                <p style="color: #aaa; margin-bottom: 30px; font-size: 18px;">Рахунок: <span id="hx-score" style="color:white; font-weight:bold;">0</span></p>
                <button class="btn" id="hx-btn" onclick="Helix.startLevel()">Спробувати ще</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // БАЗОВІ УТИЛІТИ ТА ПУЛ ЧАСТИНОК (Оптимізація)
        // ==========================================
        const MathUtils = {
            lerp: (start, end, amt) => (1 - amt) * start + amt * end,
            clamp: (val, min, max) => Math.min(Math.max(val, min), max),
            rand: (min, max) => Math.random() * (max - min) + min
        };

        class ParticlePool {
            constructor(maxSize) {
                this.pool = Array.from({length: maxSize}, () => ({ active: false }));
            }
            spawn(x, y, vx, vy, color, size, life) {
                let p = this.pool.find(p => !p.active);
                if (!p) return; // Якщо пул заповнений, ігноруємо
                p.active = true; p.x = x; p.y = y; p.vx = vx; p.vy = vy;
                p.color = color; p.size = size; p.life = life; p.maxLife = life;
            }
            updateAndDraw(ctx, dt) {
                ctx.save();
                for (let i = 0; i < this.pool.length; i++) {
                    let p = this.pool[i];
                    if (!p.active) continue;
                    
                    p.vy += 1500 * dt; // Гравітація
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= dt;
                    
                    if (p.life <= 0) { p.active = false; continue; }
                    
                    ctx.globalAlpha = p.life / p.maxLife;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        const App = {
            shake() {
                const appElem = document.getElementById('app');
                appElem.classList.remove('shake');
                void appElem.offsetWidth;
                appElem.classList.add('shake');
            },
            open(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('screen-' + id).classList.add('active');
                if(window.Helix) Helix.stop();
                if(id === 'match3') Match3.init();
                if(id === 'helix') Helix.init();
            }
        };

        // ==========================================
        // ГРА 1: ТРИ В РЯД (Стейт-машина та Фізика)
        // ==========================================
        const Match3 = {
            cols: 6, rows: 7, grid: [], score: 0, level: 1, target: 150,
            emojis: ['💖', '🌸', '💎', '🍓', '✨', '🎀'],
            state: 'idle', // idle, animating
            selected: null, startX: 0, startY: 0, boardElem: null,

            init() {
                this.boardElem = document.getElementById('match3-board');
                this.boardElem.style.gridTemplateColumns = `repeat(${this.cols}, 44px)`;
                this.level = 1; 
                this.setupInputs();
                this.startLevel();
            },
            
            setupInputs() {
                this.boardElem.ontouchstart = (e) => {
                    if(this.state !== 'idle' || !e.target.classList.contains('gem')) return;
                    this.startX = e.touches[0].clientX; this.startY = e.touches[0].clientY;
                    this.selectGem(e.target.dataset.r, e.target.dataset.c);
                };
                this.boardElem.ontouchmove = (e) => {
                    if(this.state !== 'idle' || !this.selected) return;
                    e.preventDefault();
                    let dx = e.touches[0].clientX - this.startX;
                    let dy = e.touches[0].clientY - this.startY;
                    if(Math.abs(dx) > 20 || Math.abs(dy) > 20) {
                        let tr = parseInt(this.selected.r), tc = parseInt(this.selected.c);
                        if(Math.abs(dx) > Math.abs(dy)) tc += dx > 0 ? 1 : -1; else tr += dy > 0 ? 1 : -1;
                        if(tr >= 0 && tr < this.rows && tc >= 0 && tc < this.cols) this.attemptSwap(this.selected.r, this.selected.c, tr, tc);
                        this.selected = null; this.render();
                    }
                };
                this.boardElem.onmousedown = (e) => {
                    if(this.state !== 'idle' || !e.target.classList.contains('gem')) return;
                    this.selectGem(e.target.dataset.r, e.target.dataset.c);
                };
            },

            startLevel() {
                this.score = 0; this.target = 100 + (this.level * 60);
                document.getElementById('m3-lvl').innerText = this.level;
                document.getElementById('m3-overlay').classList.remove('active');
                this.updateUI();
                
                // Генеруємо поле без готових комбінацій
                this.grid = Array.from({length: this.rows}, () => Array(this.cols).fill(null));
                for(let r=0; r<this.rows; r++) {
                    for(let c=0; c<this.cols; c++) {
                        let validEmojis = this.emojis.filter(e => {
                            let matchHoriz = c >= 2 && this.grid[r][c-1] === e && this.grid[r][c-2] === e;
                            let matchVert = r >= 2 && this.grid[r-1][c] === e && this.grid[r-2][c] === e;
                            return !matchHoriz && !matchVert;
                        });
                        this.grid[r][c] = validEmojis[Math.floor(Math.random() * validEmojis.length)];
                    }
                }
                this.render();
                this.state = 'idle';
            },
            nextLevel() { this.level++; this.startLevel(); },

            render() {
                this.boardElem.innerHTML = '';
                for(let r=0; r<this.rows; r++) {
                    for(let c=0; c<this.cols; c++) {
                        let cell = document.createElement('div');
                        cell.className = 'gem'; cell.dataset.r = r; cell.dataset.c = c;
                        cell.innerText = this.grid[r][c] || '';
                        if(this.selected && this.selected.r == r && this.selected.c == c) cell.classList.add('selected');
                        this.boardElem.appendChild(cell);
                    }
                }
            },

            selectGem(r, c) {
                r = parseInt(r); c = parseInt(c);
                if(!this.selected) { this.selected = {r, c}; this.render(); }
                else this.attemptSwap(this.selected.r, this.selected.c, r, c);
            },

            attemptSwap(r1, c1, r2, c2) {
                if((Math.abs(r1-r2)===1 && c1===c2) || (Math.abs(c1-c2)===1 && r1===r2)) {
                    this.state = 'animating';
                    let temp = this.grid[r2][c2]; this.grid[r2][c2] = this.grid[r1][c1]; this.grid[r1][c1] = temp;
                    this.selected = null; this.render();
                    
                    setTimeout(() => {
                        let matches = this.findMatches();
                        if(matches.length > 0) this.processMatches(matches);
                        else {
                            // Повертаємо назад
                            temp = this.grid[r2][c2]; this.grid[r2][c2] = this.grid[r1][c1]; this.grid[r1][c1] = temp;
                            this.render(); this.state = 'idle';
                        }
                    }, 250);
                } else { this.selected = {r: r2, c: c2}; this.render(); }
            },

            findMatches() {
                let m = [];
                for(let r=0; r<this.rows; r++) for(let c=0; c<this.cols-2; c++) 
                    if(this.grid[r][c] && this.grid[r][c]==this.grid[r][c+1] && this.grid[r][c]==this.grid[r][c+2]) m.push({r,c},{r,c:c+1},{r,c:c+2});
                for(let c=0; c<this.cols; c++) for(let r=0; r<this.rows-2; r++) 
                    if(this.grid[r][c] && this.grid[r][c]==this.grid[r+1][c] && this.grid[r][c]==this.grid[r+2][c]) m.push({r,c},{r:r+1,c},{r:r+2,c});
                return m.filter((v,i,a)=>a.findIndex(t=>(t.r===v.r && t.c===v.c))===i);
            },

            processMatches(matches) {
                const cells = document.querySelectorAll('.gem');
                let comboScore = matches.length * 10;
                
                matches.forEach(p => {
                    let idx = p.r * this.cols + p.c;
                    if(cells[idx]) cells[idx].classList.add('popping');
                    this.grid[p.r][p.c] = null; 
                });
                this.score += comboScore;
                this.updateUI();

                setTimeout(() => {
                    this.applyGravity();
                }, 300);
            },

            applyGravity() {
                // Падіння каменів
                for(let c=0; c<this.cols; c++) {
                    for(let r=this.rows-1; r>=0; r--) {
                        if(this.grid[r][c] === null) {
                            for(let k=r-1; k>=0; k--) {
                                if(this.grid[k][c] !== null) { this.grid[r][c] = this.grid[k][c]; this.grid[k][c] = null; break; }
                            }
                        }
                    }
                }
                // Заповнення порожнеч
                for(let r=0; r<this.rows; r++) {
                    for(let c=0; c<this.cols; c++) {
                        if(this.grid[r][c] === null) this.grid[r][c] = this.emojis[Math.floor(Math.random() * this.emojis.length)];
                    }
                }
                this.render();

                // Перевірка ланцюгової реакції
                setTimeout(() => {
                    let newMatches = this.findMatches();
                    if(newMatches.length > 0) this.processMatches(newMatches);
                    else {
                        // Перевірка на відсутність ходів (перемішування) - спрощено для оптимізації
                        this.state = 'idle';
                    }
                }, 200);
            },

            updateUI() {
                document.getElementById('m3-score').innerText = this.score;
                document.getElementById('m3-target').innerText = this.target;
                let pct = Math.min(100, (this.score / this.target) * 100);
                document.getElementById('m3-progress').style.width = pct + '%';
                
                if(this.score >= this.target && this.state !== 'level_complete') {
                    this.state = 'level_complete';
                    setTimeout(() => { document.getElementById('m3-overlay').classList.add('active'); }, 600);
                }
            }
        };

        // ==========================================
        // ГРА 2: HELIX JUMP (Мега-фізика, Комбо, dt)
        // ==========================================
        const Helix = {
            canvas: null, ctx: null, raf: null, lastTime: 0,
            w: 0, h: 0, rotation: 0, targetRotation: 0,
            ball: { y: 0, vy: 0, r: 12, isSuper: false }, 
            rings: [], level: 1, score: 0, lives: 3, state: 'stopped',
            isDragging: false, lastX: 0, totalRings: 0, ringsPassed: 0,
            combo: 0, particles: new ParticlePool(200),
            
            colors: { white: '#f8f9fa', red: '#ff2a55', green: '#00e676', orange: '#ff9100', orange2: '#fcc419', finish: '#9c27b0' },

            init() {
                this.canvas = document.getElementById('helix-canvas');
                this.ctx = this.canvas.getContext('2d');
                let rect = this.canvas.parentElement.getBoundingClientRect();
                this.w = this.canvas.width = rect.width; this.h = this.canvas.height = rect.height;
                
                const onMove = (e, clientX) => {
                    if(!this.isDragging || this.state !== 'play') return;
                    if(e) e.preventDefault();
                    let delta = clientX - this.lastX;
                    this.targetRotation += delta * 0.015; 
                    this.lastX = clientX;
                };
                
                this.canvas.ontouchstart = (e) => { this.isDragging = true; this.lastX = e.touches[0].clientX; };
                this.canvas.ontouchmove = (e) => onMove(e, e.touches[0].clientX);
                this.canvas.ontouchend = () => this.isDragging = false;
                
                this.canvas.onpointerdown = (e) => { this.isDragging = true; this.lastX = e.clientX; };
                this.canvas.onpointermove = (e) => onMove(null, e.clientX);
                this.canvas.onpointerup = () => this.isDragging = false;
                
                this.level = 1; this.score = 0;
                this.startLevel();
            },

            stop() { this.state = 'stopped'; cancelAnimationFrame(this.raf); },
            
            startLevel() {
                document.getElementById('hx-overlay').classList.remove('active');
                this.lives = 3; this.ringsPassed = 0; this.combo = 0; this.state = 'play';
                this.rotation = 0; this.targetRotation = 0;
                this.ball = { y: this.h * 0.25, vy: 0, r: 12, isSuper: false };
                this.totalRings = 10 + (this.level * 4);
                this.updateComboUI();
                
                this.rings = [];
                let startY = this.h * 0.55;
                for(let i=0; i<this.totalRings; i++) this.addRing(startY + i * 150, i, false);
                this.addRing(startY + this.totalRings * 150, this.totalRings, true);
                
                this.updateUI();
                this.lastTime = performance.now();
                if(this.raf) cancelAnimationFrame(this.raf);
                this.raf = requestAnimationFrame((t) => this.loop(t));
            },
            
            addRing(y, index, isFinish) {
                let segments = [];
                if(isFinish) {
                    segments.push({ start: 0, end: Math.PI*2, type: 'finish' });
                } else {
                    let slices = 6; let angle = (Math.PI*2) / slices;
                    let hasGap = false;
                    let redChance = Math.min(0.6, 0.1 + (this.level * 0.04));
                    
                    for(let i=0; i<slices; i++) {
                        let type = 'white'; let r = Math.random();
                        if(i === slices-1 && !hasGap) type = 'gap';
                        else if(r < 0.18) { type = 'gap'; hasGap = true; }
                        else if(r < 0.3) { type = 'green'; hasGap = true; }
                        else if(r < 0.3 + redChance && index > 0) type = 'red';
                        else if(r < 0.4 + redChance && index > 2) type = 'orange';

                        segments.push({ start: i*angle, end: (i+1)*angle, type: type, hits: type==='orange'?2:0 });
                    }
                    
                    let heartAngle = (this.lives === 1 && Math.random() < 0.4) ? segments.find(s=>s.type==='white' || s.type==='green')?.start + angle/2 : null;
                    this.rings.push({ y, segments, passed: false, heartAngle });
                    return;
                }
                this.rings.push({ y, segments, passed: false, heartAngle: null });
            },

            updateUI() {
                document.getElementById('hx-lvl').innerText = this.level;
                document.getElementById('hx-lives').innerText = '💖'.repeat(this.lives);
                document.getElementById('hx-progress').style.width = `${(this.ringsPassed / this.totalRings) * 100}%`;
            },
            
            updateComboUI() {
                let ct = document.getElementById('hx-combo');
                if(this.combo >= 2) {
                    ct.innerText = `COMBO x${this.combo}!`;
                    ct.classList.add('active');
                    this.ball.isSuper = true;
                } else {
                    ct.classList.remove('active');
                    this.ball.isSuper = false;
                }
            },

            spawnExplosion(x, y, color, count) {
                for(let i=0; i<count; i++) {
                    let ang = Math.random() * Math.PI * 2;
                    let speed = Math.random() * 300 + 100;
                    this.particles.spawn(x, y, Math.cos(ang)*speed, Math.sin(ang)*speed - 200, color, Math.random()*4+2, Math.random()*0.5+0.3);
                }
            },

            loop(time) {
                if(this.state !== 'play') return;
                let dt = (time - this.lastTime) / 1000;
                dt = Math.min(dt, 0.03); // Захист від лагів (max 30ms)
                this.lastTime = time;
                
                this.update(dt);
                this.draw(dt);
                this.raf = requestAnimationFrame((t) => this.loop(t));
            },

            update(dt) {
                this.rotation = MathUtils.lerp(this.rotation, this.targetRotation, 10 * dt);
                
                // Фізика
                let grav = 1800 + (this.level * 50); // Пікселів/сек^2
                this.ball.vy += grav * dt; 
                this.ball.y += this.ball.vy * dt;
                
                // Камера слідує за кулькою
                let camY = this.h * 0.35;
                if(this.ball.y > camY) {
                    let diff = this.ball.y - camY;
                    this.ball.y = camY;
                    this.rings.forEach(r => r.y -= diff);
                    this.particles.pool.forEach(p => { if(p.active) p.y -= diff; });
                }

                // Колізії
                let hitRadius = this.ball.r;
                for(let i=0; i<this.rings.length; i++) {
                    let r = this.rings[i];
                    if(r.passed || r.y < -100) continue;

                    // Перетин площини кільця
                    if(this.ball.y + hitRadius >= r.y && this.ball.y - this.ball.vy * dt <= r.y + 15) {
                        
                        let ballAngle = (Math.PI*2 - (this.rotation % (Math.PI*2))) % (Math.PI*2);
                        if(ballAngle < 0) ballAngle += Math.PI*2;
                        // Кут зсунуто на 90 градусів через перспективу (м'яч спереду)
                        let checkAngle = (ballAngle + Math.PI/2) % (Math.PI*2);

                        let hitSeg = r.segments.find(s => checkAngle >= s.start && checkAngle <= s.end);

                        if(hitSeg) {
                            // Збір сердечка
                            if(r.heartAngle !== null) {
                                let dist = Math.abs(checkAngle - r.heartAngle);
                                if(dist < 0.5 || dist > Math.PI*2 - 0.5) {
                                    this.lives = Math.min(3, this.lives + 1);
                                    r.heartAngle = null; this.updateUI();
                                    this.spawnExplosion(this.w/2, r.y, '#ff6b81', 15);
                                }
                            }

                            // Логіка Супер-комбо
                            if (this.ball.isSuper && hitSeg.type !== 'gap' && hitSeg.type !== 'finish') {
                                // Розбиваємо БУДЬ-ЯКУ платформу!
                                App.shake();
                                this.spawnExplosion(this.w/2, r.y, this.colors[hitSeg.type], 40);
                                this.passRing(r, true);
                                this.bounce(r.y, true);
                                this.combo = 0; this.updateComboUI();
                                continue;
                            }

                            // Звичайна логіка
                            if(hitSeg.type === 'gap') {
                                this.passRing(r, false);
                            } else if (hitSeg.type === 'green') {
                                this.spawnExplosion(this.w/2, r.y, this.colors.green, 30);
                                this.passRing(r, true);
                                this.bounce(r.y, false);
                            } else if (hitSeg.type === 'red') {
                                this.lives--; App.shake(); this.updateUI();
                                this.spawnExplosion(this.w/2, this.ball.y, this.colors.red, 30);
                                this.combo = 0; this.updateComboUI();
                                if(this.lives <= 0) return this.endGame(false);
                                this.bounce(r.y, true);
                            } else if (hitSeg.type === 'orange') {
                                hitSeg.hits--; this.combo = 0; this.updateComboUI();
                                if(hitSeg.hits <= 0) { this.spawnExplosion(this.w/2, r.y, this.colors.orange, 20); this.passRing(r, true); }
                                else { hitSeg.type = 'orange2'; this.bounce(r.y, false); }
                            } else if (hitSeg.type === 'finish') {
                                this.endGame(true);
                            } else {
                                // Біла (White)
                                this.combo = 0; this.updateComboUI();
                                this.bounce(r.y, false);
                            }
                        }
                    }
                    
                    // Якщо м'яч пролетів НИЖЧЕ кільця, і воно ще не passed
                    if (this.ball.y > r.y + 20 && !r.passed) {
                        this.combo++;
                        this.updateComboUI();
                        this.passRing(r, false);
                    }
                }
            },

            bounce(hitY, high) {
                this.ball.y = hitY - this.ball.r;
                this.ball.vy = high ? -800 : -550 - (this.level * 10);
            },

            passRing(ring, smashed) {
                ring.passed = true;
                this.ringsPassed++;
                this.score += smashed ? 20 : 10;
                this.updateUI();
            },

            draw(dt) {
                this.ctx.clearRect(0, 0, this.w, this.h);
                let cx = this.w / 2; let R = 95; let thick = 18;

                // Стовп (Gradient)
                let grad = this.ctx.createLinearGradient(cx - 20, 0, cx + 20, 0);
                grad.addColorStop(0, '#0a0a0a'); grad.addColorStop(0.5, '#222'); grad.addColorStop(1, '#050505');
                this.ctx.fillStyle = grad;
                this.ctx.fillRect(cx - 20, 0, 40, this.h);

                // Кільця
                for (let r of this.rings) {
                    if(r.passed || r.y < -50 || r.y > this.h + 50) continue;

                    for(let s of r.segments) {
                        if(s.type === 'gap') continue;
                        
                        this.ctx.beginPath();
                        // Важливо: додаємо rotation до малювання
                        this.ctx.arc(cx, r.y, R, s.start + this.rotation, s.end + this.rotation);
                        this.ctx.lineWidth = thick;
                        this.ctx.strokeStyle = this.colors[s.type] || this.colors.white;
                        this.ctx.stroke();
                        
                        // Відблиск
                        this.ctx.beginPath();
                        this.ctx.arc(cx, r.y - thick/2 + 2, R, s.start + this.rotation, s.end + this.rotation);
                        this.ctx.lineWidth = 2; this.ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                        this.ctx.stroke();
                    }
                    
                    // Сердечко життя на кільці
                    if(r.heartAngle !== null) {
                        let hx = cx + R * Math.cos(r.heartAngle + this.rotation);
                        let hy = r.y + R * Math.sin(r.heartAngle + this.rotation);
                        this.ctx.font = "20px Arial"; this.ctx.fillText("💖", hx-10, hy+7);
                    }
                }

                // Частинки
                this.particles.updateAndDraw(this.ctx, dt);

                // Герой
                this.ctx.save();
                this.ctx.translate(cx, this.ball.y - 12);
                
                // Стиснення при швидкості
                let stretch = MathUtils.clamp(1 + this.ball.vy * 0.0005, 0.6, 1.3);
                this.ctx.scale(1/stretch, stretch);
                
                this.ctx.font = "34px Arial";
                this.ctx.textAlign = "center"; this.ctx.textBaseline = "middle";
                
                if(this.ball.isSuper) {
                    this.ctx.shadowBlur = 25; this.ctx.shadowColor = varCombo = '#00d4ff';
                    // Вогняний слід
                    this.particles.spawn(cx + MathUtils.rand(-10,10), this.ball.y, 0, MathUtils.rand(-50,-10), '#00d4ff', MathUtils.rand(3,6), 0.3);
                } else {
                    this.ctx.shadowBlur = 10; this.ctx.shadowColor = '#ff2a55';
                }
                
                this.ctx.fillText("💖", 0, 0);
                this.ctx.restore();
            },

            endGame(win) {
                this.state = 'stopped';
                let msg = document.getElementById('hx-msg');
                let btn = document.getElementById('hx-btn');
                
                if(win) {
                    msg.innerText = "Успіх! 🎉"; msg.style.color = "var(--success)";
                    this.level++; btn.innerText = "Наступний рівень";
                } else {
                    msg.innerText = "Впала... 💥"; msg.style.color = "var(--accent)";
                    btn.innerText = "Спробувати ще";
                }
                
                document.getElementById('hx-score').innerText = this.score;
                document.getElementById('hx-combo').classList.remove('active');
                document.getElementById('hx-overlay').classList.add('active');
            }
        };
    </script>
</body>
</html>
