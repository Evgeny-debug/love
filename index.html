<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Для моєї Манюні ❤️</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 80% 20%, #3a1c3f, #0f051d, #000000);
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Головний скляний екран */
        .glass-box {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            z-index: 10;
            max-width: 90vw;
            transition: all 0.5s ease;
        }

        #main-text {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ff758c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            min-height: 60px;
        }

        /* Ігрове поле */
        #game-board {
            display: none;
            position: relative;
            width: 360px;
            height: 540px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 24px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            touch-action: none;
        }

        /* Елемент серця */
        .heart-item {
            position: absolute;
            width: 40px;
            height: 40px;
            cursor: grab;
            transition: top 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), left 0.2s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .heart-shape {
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 85%, 12% 42%, 12% 22%, 31% 10%, 50% 25%, 69% 10%, 88% 22%, 88% 42%);
            position: relative;
            box-shadow: inset -3px -3px 7px rgba(0,0,0,0.3);
        }

        /* Ефект бліку сонця справа вгорі */
        .heart-shape::after {
            content: '';
            position: absolute;
            top: 15%;
            right: 15%;
            width: 25%;
            height: 25%;
            background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
        }

        .heart-item:active { cursor: grabbing; transform: scale(0.9); }

        /* Анімація Ульти */
        @keyframes ult-flash {
            0% { background: rgba(255, 255, 255, 0); }
            50% { background: rgba(255, 255, 255, 0.9); }
            100% { background: rgba(255, 255, 255, 0); }
        }
        .ult-active { animation: ult-flash 0.6s ease-out; }

        /* Кнопки */
        button {
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 16px 36px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        button:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="ui-container" class="glass-box">
        <h1 id="main-text"></h1>
        <button id="btn-action" onclick="activateMagic()">Натисни, щоб посилити магію ❤️</button>
    </div>

    <div id="game-board"></div>

<script>
    const BOARD_ROWS = 12;
    const BOARD_COLS = 8;
    const CELL_SIZE = 45; // 45px * 8 = 360px ширина, * 12 = 540px висота

    // Кольори (Червоний - УЛЬТА, інші - звичайні градієнти)
    const gemColors = {
        red: 'linear-gradient(135deg, #ff4d6d, #c9184a)',
        blue: 'linear-gradient(135deg, #00b4d8, #0077b6)',
        purple: 'linear-gradient(135deg, #9d4edd, #5a189a)',
        orange: 'linear-gradient(135deg, #ff9e00, #ff6000)',
        green: 'linear-gradient(135deg, #52b788, #2d6a4f)'
    };
    const colorKeys = Object.keys(gemColors);

    let boardState = [];
    let isTransitioning = false;
    let dragStartCell = null;

    async function activateMagic() {
        const btn = document.getElementById('btn-action');
        if (btn.innerText.includes("магію")) {
            btn.style.display = 'none';
            const text = "Я тебе кохаю манюня";
            const h1 = document.getElementById('main-text');
            for(let char of text) {
                h1.innerText += char;
                await new Promise(r => setTimeout(r, 100));
            }
            btn.innerText = 'Грати в "Сердечка"';
            btn.style.display = 'inline-block';
        } else {
            document.getElementById('ui-container').style.display = 'none';
            const board = document.getElementById('game-board');
            board.style.display = 'block';
            initGame();
        }
    }

    function initGame() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        boardState = [];

        for (let r = 0; r < BOARD_ROWS; r++) {
            boardState[r] = [];
            for (let c = 0; c < BOARD_COLS; c++) {
                createGemAt(r, c, false); // Початкове заповнення без анімації дощу
            }
        }
        
        // Перевіримо, щоб на старті випадково не було готових ліній
        resolveMatches();
        setupInputHandlers();
    }

    function createGemAt(r, c, isRain = false) {
        const type = colorKeys[Math.floor(Math.random() * colorKeys.length)];
        const gem = document.createElement('div');
        gem.className = 'heart-item';
        
        const shape = document.createElement('div');
        shape.className = 'heart-shape';
        shape.style.background = gemColors[type];
        gem.appendChild(shape);

        // Позиціонування фігури
        gem.style.left = `${c * CELL_SIZE}px`;
        if (isRain) {
            // Звідки падає (вище поля як дощ)
            gem.style.top = `${-Math.random() * 300 - 50}px`;
            setTimeout(() => {
                gem.style.top = `${r * CELL_SIZE}px`;
            }, 50);
        } else {
            gem.style.top = `${r * CELL_SIZE}px`;
        }

        document.getElementById('game-board').appendChild(gem);
        boardState[r][c] = { type, element: gem };
    }

    // Обробка взаємодії (Мишка та Тач-свайпи)
    function setupInputHandlers() {
        const board = document.getElementById('game-board');
        
        const getCellFromCoords = (clientX, clientY) => {
            const rect = board.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            const c = Math.floor(x / CELL_SIZE);
            const r = Math.floor(y / CELL_SIZE);
            if (r >= 0 && r < BOARD_ROWS && c >= 0 && c < BOARD_COLS) return { r, c };
            return null;
        };

        const handleStart = (clientX, clientY) => {
            if (isTransitioning) return;
            const cell = getCellFromCoords(clientX, clientY);
            if (cell) {
                dragStartCell = cell;
                boardState[cell.r][cell.c].element.style.transform = 'scale(1.15)';
            }
        };

        const handleMove = (clientX, clientY) => {
            if (!dragStartCell || isTransitioning) return;
            const currentCell = getCellFromCoords(clientX, clientY);
            if (!currentCell) return;

            const rDiff = currentCell.r - dragStartCell.r;
            const cDiff = currentCell.c - dragStartCell.c;

            if (Math.abs(rDiff) + Math.abs(cDiff) === 1) {
                executeSwap(dragStartCell, currentCell);
                handleEnd();
            }
        };

        const handleEnd = () => {
            if (dragStartCell && boardState[dragStartCell.r]?.[dragStartCell.c]) {
                boardState[dragStartCell.r][dragStartCell.c].element.style.transform = 'scale(1)';
            }
            dragStartCell = null;
        };

        board.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
        board.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);

        board.addEventListener('touchstart', e => {
            handleStart(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: true});
        board.addEventListener('touchmove', e => {
            handleMove(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: true});
        window.addEventListener('touchend', handleEnd);
    }

    async function executeSwap(cell1, cell2) {
        isTransitioning = true;
        
        // Візуальний обмін місцями
        const gem1 = boardState[cell1.r][cell1.c];
        const gem2 = boardState[cell2.r][cell2.c];

        gem1.element.style.left = `${cell2.c * CELL_SIZE}px`;
        gem1.element.style.top = `${cell2.r * CELL_SIZE}px`;
        gem2.element.style.left = `${cell1.c * CELL_SIZE}px`;
        gem2.element.style.top = `${cell1.r * CELL_SIZE}px`;

        boardState[cell1.r][cell1.c] = gem2;
        boardState[cell2.r][cell2.c] = gem1;

        await new Promise(r => setTimeout(r, 250));

        // Перевірка комбінацій
        const hasMatches = checkAndMatch();
        if (!hasMatches) {
            // Повернення назад, якщо немає збігів
            gem1.element.style.left = `${cell1.c * CELL_SIZE}px`;
            gem1.element.style.top = `${cell1.r * CELL_SIZE}px`;
            gem2.element.style.left = `${cell2.c * CELL_SIZE}px`;
            gem2.element.style.top = `${cell2.r * CELL_SIZE}px`;
            boardState[cell1.r][cell1.c] = gem1;
            boardState[cell2.r][cell2.c] = gem2;
            isTransitioning = false;
        } else {
            resolveMatches();
        }
    }

    function checkAndMatch() {
        let toDestroy = Array(BOARD_ROWS).fill(null).map(() => Array(BOARD_COLS).fill(false));
        let matched = false;

        // Пошук по горизонталі (3+ в ряд, будь-які суміжні форми)
        for (let r = 0; r < BOARD_ROWS; r++) {
            for (let c = 0; c < BOARD_COLS - 2; c++) {
                let type = boardState[r][c]?.type;
                if (type && type === boardState[r][c+1]?.type && type === boardState[r][c+2]?.type) {
                    toDestroy[r][c] = toDestroy[r][c+1] = toDestroy[r][c+2] = true;
                    matched = true;
                }
            }
        }

        // Пошук по вертикалі
        for (let c = 0; c < BOARD_COLS; c++) {
            for (let r = 0; r < BOARD_ROWS - 2; r++) {
                let type = boardState[r][c]?.type;
                if (type && type === boardState[r+1][c]?.type && type === boardState[r+2][c]?.type) {
                    toDestroy[r][c] = toDestroy[r+1][c] = toDestroy[r+2][c] = true;
                    matched = true;
                }
            }
        }

        // Позначення на знищення
        for (let r = 0; r < BOARD_ROWS; r++) {
            for (let c = 0; c < BOARD_COLS; c++) {
                if (toDestroy[r][c]) boardState[r][c].match = true;
            }
        }

        return matched;
    }

    async function resolveMatches() {
        let hasUlt = false;

        // Перевіряємо, чи є серед підірваних червоні (УЛЬТА)
        for (let r = 0; r < BOARD_ROWS; r++) {
            for (let c = 0; c < BOARD_COLS; c++) {
                if (boardState[r][c]?.match && boardState[r][c].type === 'red') {
                    hasUlt = true;
                }
            }
        }

        if (hasUlt) {
            await triggerUltAnimation();
            return;
        }

        // Звичайне знищення та падіння
        let destroyedAny = false;
        for (let r = 0; r < BOARD_ROWS; r++) {
            for (let c = 0; c < BOARD_COLS; c++) {
                if (boardState[r][c]?.match) {
                    boardState[r][c].element.style.transform = 'scale(0)';
                    setTimeout(((el) => () => el.remove())(boardState[r][c].element), 200);
                    boardState[r][c] = null;
                    destroyedAny = true;
                }
            }
        }

        if (destroyedAny) {
            await new Promise(r => setTimeout(r, 200));
            await applyGravity();
            // Рекурсивна перевірка на нові комбінації після падіння
            if (checkAndMatch()) {
                await resolveMatches();
            } else {
                isTransitioning = false;
            }
        } else {
            isTransitioning = false;
        }
    }

    // Ефект Ульти: вибух всього поля та дощ із нових фігур
    async function triggerUltAnimation() {
        const board = document.getElementById('game-board');
        board.classList.add('ult-active');

        // Усі серця розлітаються геть
        for (let r = 0; r < BOARD_ROWS; r++) {
            for (let c = 0; c < BOARD_COLS; c++) {
                if (boardState[r][c]) {
                    const el = boardState[r][c].element;
                    el.style.transform = `translate(${(Math.random() - 0.5) * 400}px, ${(Math.random() - 0.5) * 400}px) scale(0)`;
                    el.style.opacity = '0';
                    setTimeout(() => el.remove(), 300);
                }
            }
        }

        boardState = [];
        await new Promise(r => setTimeout(r, 400));
        board.classList.remove('ult-active');

        // Падіння дощу нових фігур
        for (let r = 0; r < BOARD_ROWS; r++) {
            boardState[r] = [];
            for (let c = 0; c < BOARD_COLS; c++) {
                createGemAt(r, c, true); // true активує падіння з неба
            }
        }

        await new Promise(r => setTimeout(r, 600));
        
        if (checkAndMatch()) {
            await resolveMatches();
        } else {
            isTransitioning = false;
        }
    }

    // Спрощена фізика падіння та заповнення пустот
    async function applyGravity() {
        for (let c = 0; c < BOARD_COLS; c++) {
            let emptySpaces = 0;
            // Йдемо знизу вгору
            for (let r = BOARD_ROWS - 1; r >= 0; r--) {
                if (boardState[r][c] === null) {
                    emptySpaces++;
                } else if (emptySpaces > 0) {
                    // Зсуваємо фігуру вниз на кількість порожніх місць
                    const gem = boardState[r][c];
                    boardState[r + emptySpaces][c] = gem;
                    boardState[r][c] = null;
                    gem.element.style.top = `${(r + emptySpaces) * CELL_SIZE}px`;
                }
            }
            // Створюємо нові елементи зверху для цього стовпчика
            for (let i = 0; i < emptySpaces; i++) {
                createGemAt(i, c, true);
            }
        }
        await new Promise(r => setTimeout(r, 300));
    }
</script>
</body>
</html>
