<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Для Манюні ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
            --glow: #ff4d6d;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at 80% 20%, #251128, #0a0314, #000000);
            font-family: 'Montserrat', sans-serif;
            color: white; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        /* Екран привітання */
        .cli-container {
            background: rgba(5, 5, 5, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 35px;
            width: 85vw; max-width: 450px; text-align: left;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        .cli-text {
            font-family: 'Fira Code', monospace;
            font-size: 1.6rem; color: #ff758c;
            min-height: 50px; line-height: 1.4;
            margin-bottom: 30px; word-wrap: break-word;
        }

        .cursor { animation: blink 0.8s infinite; color: white; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Анімована кнопка */
        .btn-glow {
            background: linear-gradient(135deg, rgba(255,77,109,0.3), rgba(255,117,140,0.1));
            color: white; border: 1px solid rgba(255,77,109,0.5);
            padding: 16px 32px; border-radius: 14px;
            font-size: 1.1rem; font-weight: 700; width: 100%;
            cursor: pointer; box-shadow: 0 0 15px rgba(255,77,109,0.2);
            animation: pulseGlow 2s infinite; transition: all 0.3s;
        }
        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(255,77,109,0.2); }
            50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(255,77,109,0.5); border-color: #ff758c; }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(255,77,109,0.2); }
        }

        /* Ігровий інтерфейс */
        #game-layout {
            display: none; flex-direction: column; align-items: center;
            transform: translateY(-25px); /* Трішки підняли поле вгору */
        }

        .stats-panel {
            display: flex; justify-content: space-between; width: 340px;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 16px;
            padding: 12px 20px; margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 0.75rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.3rem; font-weight: 800; color: #ff758c; margin-top: 20px; transition: transform 0.1s ease; }

        /* Поле гри */
        #game-board {
            position: relative; width: 360px; height: 540px;
            background: rgba(0, 0, 0, 0.3); border-radius: 24px;
            backdrop-filter: blur(30px); border: 1px solid var(--border);
            overflow: hidden; touch-action: none;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.6), 0 15px 45px rgba(0,0,0,0.5);
        }

        /* Сердечка */
        .heart-item {
            position: absolute; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            transition: top 0.3s cubic-bezier(0.25, 1, 0.5, 1.1), left 0.2s ease, transform 0.15s ease, opacity 0.25s ease;
        }

        .heart-shape {
            width: 82%; height: 82%;
            clip-path: polygon(50% 88%, 10% 45%, 10% 23%, 30% 9%, 50% 26%, 70% 9%, 90% 23%, 90% 45%);
            position: relative;
        }
        .heart-shape::after {
            content: ''; position: absolute; top: 12%; right: 12%;
            width: 25%; height: 25%; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 80%);
        }

        /* Ефекти часток ульти */
        .particle {
            position: absolute; pointer-events: none;
            clip-path: polygon(50% 88%, 10% 45%, 10% 23%, 30% 9%, 50% 26%, 70% 9%, 90% 23%, 90% 45%);
            animation: explode 0.8s forwards cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Величезне серце Ульти */
        #ult-overlay {
            position: absolute; inset: 0; background: rgba(255,255,255,0);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; pointer-events: none; transition: background 0.2s;
        }
        #ult-heart {
            width: 0px; height: 0px; background: linear-gradient(135deg, #ff4d6d, #c9184a);
            clip-path: polygon(50% 88%, 10% 45%, 10% 23%, 30% 9%, 50% 26%, 70% 9%, 90% 23%, 90% 45%);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body>

    <!-- Стартова панель -->
    <div id="welcome-panel" class="cli-container">
        <div id="cli-box" class="cli-text"></div>
        <button id="btn-action" class="btn-glow" onclick="handleMainAction()">Натисни, щоб посилити магію ❤️</button>
    </div>

    <!-- Ігрове поле -->
    <div id="game-layout">
        <div class="stats-panel">
            <div class="stat-item">
                <div class="stat-label">Очки</div>
                <div id="score-val" class="stat-value">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Час</div>
                <div id="timer-val" class="stat-value">60</div>
            </div>
        </div>
        <div id="game-board">
            <div id="ult-overlay"><div id="ult-heart"></div></div>
        </div>
    </div>

<script>
    // --- СИНТЕЗАТОР ЗВУКІВ (Web Audio API) ---
    const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = AudioCtx.createOscillator();
        const gain = AudioCtx.createGain();
        osc.connect(gain); gain.connect(AudioCtx.destination);

        const now = AudioCtx.currentTime;
        if (type === 'type') { // Друк
            osc.type = 'triangle'; osc.frequency.setValueAtTime(120, now);
            gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            osc.start(now); osc.stop(now + 0.05);
        } else if (type === 'click') { // Клік
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'swipe') { // Свайп
            osc.type = 'sine'; osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(150, now + 0.15);
            gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'match') { // Співпадіння
            osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now); // C5
            osc.frequency.setValueAtTime(659.25, now + 0.08); // E5
            gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
            osc.start(now); osc.stop(now + 0.25);
        } else if (type === 'score') { // Рост рахунку
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, now);
            gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            osc.start(now); osc.stop(now + 0.08);
        } else if (type === 'ult') { // УЛЬТА
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.5);
            gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
            osc.start(now); osc.stop(now + 0.6);
        }
    }

    // --- СИМУЛЯЦІЯ VIBRATION (Haptic Engine) ---
    function triggerHaptic(type) {
        if (!navigator.vibrate) return;
        if (type === 'success') {
            navigator.vibrate(2); // Чіткий короткий клік (2 мс)
        } else if (type === 'fail') {
            navigator.vibrate([10, 30, 10]); // Подвійний швидкий тактильний відгук
        }
    }

    // --- ЛОГІКА ДРУКУ CLI ---
    const phrase = "Я тебе кохаю манюня";
    let charIndex = 0;
    function typeCLI() {
        const box = document.getElementById('cli-box');
        if (charIndex < phrase.length) {
            box.innerHTML = phrase.substring(0, charIndex + 1) + '<span class="cursor">_</span>';
            playSound('type');
            charIndex++;
            setTimeout(typeCLI, 120);
        } else {
            box.innerHTML = phrase + '<span class="cursor">_</span>';
            const btn = document.getElementById('btn-action');
            btn.innerText = 'Грати в "Сердечка"';
            btn.style.display = 'block';
        }
    }

    function handleMainAction() {
        playSound('click');
        const btn = document.getElementById('btn-action');
        if (btn.innerText.includes("магію")) {
            btn.style.display = 'none';
            typeCLI();
        } else {
            document.getElementById('welcome-panel').style.display = 'none';
            document.getElementById('game-layout').style.display = 'flex';
            setupGame();
        }
    }

    // --- СИСТЕМА МАТЧ-3 ГРИ ---
    const ROWS = 12, COLS = 8, CELL = 45;
    const colors = {
        red: 'linear-gradient(135deg, #ff4d6d, #c9184a)',
        blue: 'linear-gradient(135deg, #00b4d8, #0077b6)',
        purple: 'linear-gradient(135deg, #9d4edd, #5a189a)',
        orange: 'linear-gradient(135deg, #ff9e00, #ff6000)',
        green: 'linear-gradient(135deg, #52b788, #2d6a4f)'
    };
    const colorKeys = Object.keys(colors);
    
    let board = [], isLocked = false, dragStart = null;
    let score = 0, timeLeft = 60, gameTimer = null;

    function setupGame() {
        const container = document.getElementById('game-board');
        for (let r = 0; r < ROWS; r++) {
            board[r] = [];
            for (let c = 0; c < COLS; c++) {
                spawnGem(r, c, false);
            }
        }
        cleanInitialMatches();
        renderBoard();
        initControls();
        
        gameTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-val').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(gameTimer);
                alert(`Час вийшов! Твій результат: ${score}`);
                location.reload();
            }
        }, 1000);
    }

    function spawnGem(r, c, isRain) {
        const type = colorKeys[Math.floor(Math.random() * colorKeys.length)];
        const el = document.createElement('div');
        el.className = 'heart-item';
        const shape = document.createElement('div');
        shape.className = 'heart-shape';
        shape.style.background = colors[type];
        el.appendChild(shape);

        if (isRain) {
            el.style.top = `${-Math.random() * 250 - 50}px`;
        } else {
            el.style.top = `${r * CELL}px`;
        }
        el.style.left = `${c * CELL}px`;
        
        document.getElementById('game-board').appendChild(el);
        board[r][c] = { type, element: el };
        
        if (isRain) {
            setTimeout(() => { el.style.top = `${r * CELL}px`; }, 40);
        }
    }

    function renderBoard() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    board[r][c].element.style.top = `${r * CELL}px`;
                    board[r][c].element.style.left = `${c * CELL}px`;
                }
            }
        }
    }

    function cleanInitialMatches() {
        let hasMatches = true;
        while (hasMatches) {
            hasMatches = false;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if ((c < COLS - 2 && board[r][c].type === board[r][c+1].type && board[r][c].type === board[r][c+2].type) ||
                        (r < ROWS - 2 && board[r][c].type === board[r+1][c].type && board[r][c].type === board[r+2][c].type)) {
                        board[r][c].type = colorKeys[(colorKeys.indexOf(board[r][c].type) + 1) % colorKeys.length];
                        board[r][c].element.querySelector('.heart-shape').style.background = colors[board[r][c].type];
                        hasMatches = true;
                    }
                }
            }
        }
    }

    function initControls() {
        const g = document.getElementById('game-board');
        const getCoord = (e) => {
            const r = g.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { c: Math.floor((clientX - r.left) / CELL), r: Math.floor((clientY - r.top) / CELL) };
        };

        const start = (e) => { if (isLocked) return; dragStart = getCoord(e); };
        const move = (e) => {
            if (!dragStart || isLocked) return;
            const curr = getCoord(e);
            const dr = curr.r - dragStart.r, dc = curr.c - dragStart.c;
            if (Math.abs(dr) + Math.abs(dc) === 1) {
                swapGems(dragStart, curr);
                dragStart = null;
            }
        };

        g.addEventListener('mousedown', start); g.addEventListener('mousemove', move);
        g.addEventListener('touchstart', start, {passive:true}); g.addEventListener('touchmove', move, {passive:true});
    }

    async function swapGems(p1, p2) {
        if (p1.r < 0 || p1.r >= ROWS || p1.c < 0 || p1.c >= COLS || p2.r < 0 || p2.r >= ROWS || p2.c < 0 || p2.c >= COLS) return;
        isLocked = true;
        playSound('swipe');

        let g1 = board[p1.r][p1.c], g2 = board[p2.r][p2.c];
        board[p1.r][p1.c] = g2; board[p2.r][p2.c] = g1;
        renderBoard();

        await new Promise(r => setTimeout(r, 250));

        if (!await checkMatches()) {
            triggerHaptic('fail');
            board[p1.r][p1.c] = g1; board[p2.r][p2.c] = g2;
            renderBoard();
            await new Promise(r => setTimeout(r, 200));
            isLocked = false;
        }
    }

    async function checkMatches() {
        let matched = false;
        let destroyGrid = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));

        // Пошук збігів по лініях/Г-формах
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS - 2; c++) {
                if (board[r][c] && board[r][c+1] && board[r][c+2] && board[r][c].type === board[r][c+1].type && board[r][c].type === board[r][c+2].type) {
                    destroyGrid[r][c] = destroyGrid[r][c+1] = destroyGrid[r][c+2] = true; matched = true;
                }
            }
        }
        for (let c = 0; c < COLS; c++) {
            for (let r = 0; r < ROWS - 2; r++) {
                if (board[r][c] && board[r+1][c] && board[r+2][c] && board[r][c].type === board[r+1][c].type && board[r][c].type === board[r+2][c].type) {
                    destroyGrid[r][c] = destroyGrid[r+1][c] = destroyGrid[r+2][c] = true; matched = true;
                }
            }
        }

        if (!matched) return false;

        // Пошук зв'язних кластерів для підрахунку ульти
        let visited = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
        let clusters = [];

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (destroyGrid[r][c] && !visited[r][c]) {
                    let cluster = [];
                    getCluster(r, c, board[r][c].type, destroyGrid, visited, cluster);
                    clusters.push(cluster);
                }
            }
        }

        // Перевіряємо умови Ульти (червоний колір && розмір групи >= 5)
        let isUltActive = false;
        for (let cl of clusters) {
            if (cl.length >= 5 && cl[0].type === 'red') {
                isUltActive = true;
            }
        }

        if (isUltActive) {
            await runUltimate();
        } else {
            await dissolveGems(destroyGrid);
        }
        return true;
    }

    function getCluster(r, c, type, destroyGrid, visited, cluster) {
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS || visited[r][c] || !destroyGrid[r][c] || board[r][c].type !== type) return;
        visited[r][c] = true;
        cluster.push({ r, c, type: board[r][c].type });
        getCluster(r+1, c, type, destroyGrid, visited, cluster);
        getCluster(r-1, c, type, destroyGrid, visited, cluster);
        getCluster(r, c+1, type, destroyGrid, visited, cluster);
        getCluster(r, c-1, type, destroyGrid, visited, cluster);
    }

    // Звичайне стильне розчинення
    async function dissolveGems(destroyGrid) {
        playSound('match');
        triggerHaptic('success');
        let count = 0;

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (destroyGrid[r][c] && board[r][c]) {
                    count++;
                    const el = board[r][c].element;
                    const dirX = (Math.random() - 0.5) * 60;
                    const dirY = (Math.random() - 0.5) * 60;
                    
                    el.style.transform = `translate(${dirX}px, ${dirY}px) scale(0)`;
                    el.style.opacity = '0';
                    setTimeout(((target) => () => target.remove())(el), 250);
                    board[r][c] = null;
                }
            }
        }
        updateScore(count * 10);
        await new Promise(r => setTimeout(r, 250));
        await applyGravity();
    }

    // Анімація СУПЕР УЛЬТИ
    async function runUltimate() {
        playSound('ult');
        const overlay = document.getElementById('ult-overlay');
        const uHeart = document.getElementById('ult-heart');
        
        overlay.style.background = 'rgba(255,255,255,0.15)';
        uHeart.style.width = '180px'; uHeart.style.height = '180px';

        await new Promise(r => setTimeout(r, 500));
        uHeart.style.transform = 'scale(0)';
        overlay.style.background = 'rgba(255,255,255,0)';

        // Вибух різнокольорових дрібних сердець
        const boardEl = document.getElementById('game-board');
        for (let i = 0; i < 80; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = '15px'; p.style.height = '15px';
            p.style.background = colors[colorKeys[Math.floor(Math.random() * colorKeys.length)]];
            p.style.left = '50%'; p.style.top = '50%';
            p.style.setProperty('--tx', `${(Math.random() - 0.5) * 400}px`);
            p.style.setProperty('--ty', `${(Math.random() - 0.5) * 600}px`);
            boardEl.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        // Очищення всього поля
        let totalGems = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    totalGems++;
                    board[r][c].element.remove();
                    board[r][c] = null;
                }
            }
        }

        updateScore(totalGems * 15);
        uHeart.style.width = '0px'; uHeart.style.height = '0px'; uHeart.style.transform = 'scale(1)';

        await new Promise(r => setTimeout(r, 300));
        
        // Повний дощ нових сердець
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                spawnGem(r, c, true);
            }
        }
        await new Promise(r => setTimeout(r, 450));
        await checkMatches();
    }

    async function applyGravity() {
        for (let c = 0; c < COLS; c++) {
            let empty = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r][c] === null) { empty++; }
                else if (empty > 0) {
                    board[r + empty][c] = board[r][c];
                    board[r][c] = null;
                }
            }
            for (let i = 0; i < empty; i++) {
                spawnGem(i, c, true);
            }
        }
        renderBoard();
        await new Promise(r => setTimeout(r, 350));
        if (!await checkMatches()) { isLocked = false; }
    }

    function updateScore(amount) {
        score += amount;
        const sv = document.getElementById('score-val');
        sv.innerText = score;
        sv.style.transform = 'scale(1.3)';
        playSound('score');
        setTimeout(() => sv.style.transform = 'scale(1)', 100);
    }
</script>
</body>
</html>
