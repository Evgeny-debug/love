<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Hub | Premium Full</title>
    <style>
        /* =========================================
           [1. CSS VARIABLES & RESET]
           ========================================= */
        :root {
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.1);
            --accent: #ff4d6d;
            --text: #ffffff;
            --text-muted: #888888;
        }
        * { box-sizing: border-box; touch-action: manipulation; user-select: none; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; 
        }

        /* =========================================
           [2. UI COMPONENTS (GLASSMORPHISM)]
           ========================================= */
        .glass { background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; opacity: 0; transition: opacity 0.3s ease; }
        .screen.active { display: flex; opacity: 1; z-index: 10; }
        
        .btn { 
            padding: 16px 32px; border: 1px solid var(--glass-border); border-radius: 14px; 
            background: var(--glass); color: white; cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            margin: 10px; font-weight: 600; font-size: 16px; letter-spacing: 0.5px;
        }
        .btn:hover { background: var(--glass-hover); transform: translateY(-3px); }
        .btn:active { transform: scale(0.95); }
        
        .stats-panel { display: flex; gap: 20px; margin-bottom: 30px; font-size: 14px; color: var(--text-muted); }
        .stats-panel span { color: var(--accent); font-weight: bold; }

        /* =========================================
           [3. PARTICLE SYSTEM (TIKTOK HEARTS)]
           ========================================= */
        .particle { position: absolute; pointer-events: none; z-index: 9999; animation: floatUp 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; fill: var(--accent); }
        @keyframes floatUp { 
            0% { transform: scale(0) translateY(0) rotate(-10deg); opacity: 1; } 
            50% { transform: scale(1.2) translateY(-60px) rotate(10deg); opacity: 0.8; }
            100% { transform: scale(0.5) translateY(-120px) rotate(-10deg); opacity: 0; } 
        }

        /* =========================================
           [4. TIC TAC TOE STYLES]
           ========================================= */
        .ttt-wrapper { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 90px); gap: 12px; margin-bottom: 20px; }
        .cell { 
            width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: background 0.2s, transform 0.2s; border-radius: 16px;
        }
        .cell:hover { background: var(--glass-hover); }
        .cell:active { transform: scale(0.92); }
        .cell svg { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        /* =========================================
           [5. FLAPPY HEART STYLES]
           ========================================= */
        #flappy-container { width: 320px; height: 480px; position: relative; overflow: hidden; border-radius: 24px; cursor: pointer; }
        #flappy-bird { width: 34px; height: 34px; position: absolute; left: 50px; top: 220px; z-index: 5; transition: transform 0.1s; fill: var(--accent); }
        .pipe { position: absolute; width: 60px; background: rgba(255, 255, 255, 0.1); border: 2px solid var(--glass-border); border-radius: 8px; z-index: 4; }
        #flappy-score-display { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 40px; font-weight: bold; color: rgba(255,255,255,0.8); z-index: 6; text-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none; }
        .flappy-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .flappy-overlay.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <!-- [APP CONTAINER] -->
    <div id="app" style="width: 100%; max-width: 450px; height: 100%; position: relative;">
        
        <!-- ================= MAIN MENU ================= -->
        <div id="screen-menu" class="screen active">
            <h1 style="margin-bottom: 10px; font-size: 2.5rem; letter-spacing: 1px;">Arcade Hub</h1>
            <div class="stats-panel">
                <div>TTT Перемог: <span id="stat-ttt-wins">0</span></div>
                <div>Flappy Рекорд: <span id="stat-flappy-high">0</span></div>
            </div>
            <button class="btn glass" onclick="App.switchScreen('ttt')">Хрестики vs Робот 🏹</button>
            <button class="btn glass" onclick="App.switchScreen('flappy')">Flappy Heart 💖</button>
        </div>

        <!-- ================= TIC TAC TOE ================= -->
        <div id="screen-ttt" class="screen">
            <div class="glass ttt-wrapper">
                <h2 id="ttt-status" style="margin-bottom: 20px; font-weight: 400;">Твій хід 💖</h2>
                <div id="ttt-grid" class="grid"></div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" onclick="TTT.init()">Заново</button>
                    <button class="btn" onclick="App.switchScreen('menu')">В меню</button>
                </div>
            </div>
        </div>

        <!-- ================= FLAPPY HEART ================= -->
        <div id="screen-flappy" class="screen">
            <div id="flappy-container" class="glass" onmousedown="Flappy.jump()" ontouchstart="Flappy.jump()">
                <div id="flappy-score-display">0</div>
                <div id="flappy-bird">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </div>
                <!-- Game Over Overlay -->
                <div id="flappy-gameover" class="flappy-overlay">
                    <h2 style="margin-bottom: 10px;">Гру закінчено!</h2>
                    <p style="margin-bottom: 20px;">Рахунок: <span id="flappy-final-score" style="color:var(--accent); font-weight:bold;">0</span></p>
                    <button class="btn glass" onclick="Flappy.start(event)">Грати ще</button>
                    <button class="btn glass" onclick="App.switchScreen('menu')">В меню</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /** =========================================================
         *  [CORE] ASSETS & UTILS
         *  ========================================================= */
        const ICONS = {
            HEART: `<svg viewBox="0 0 24 24" width="45" height="45" fill="#ff4d6d"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
            BOW: `<svg viewBox="0 0 24 24" width="45" height="45" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3l-6 6 6 6M9 9l6 6M3 12h18"/></svg>`
        };

        const Storage = {
            get: (key, def) => parseInt(localStorage.getItem(key)) || def,
            set: (key, val) => localStorage.setItem(key, val)
        };

        /** =========================================================
         *  [SYSTEM] TIKTOK PARTICLES
         *  ========================================================= */
        class ParticleSystem {
            constructor() {
                document.addEventListener('mousedown', (e) => this.spawn(e.clientX, e.clientY));
                document.addEventListener('touchstart', (e) => this.spawn(e.touches[0].clientX, e.touches[0].clientY));
            }
            spawn(x, y) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerHTML = ICONS.HEART;
                p.style.left = `${x - 22}px`;
                p.style.top = `${y - 22}px`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1200);
            }
        }

        /** =========================================================
         *  [GAME 1] TIC TAC TOE (UNBEATABLE MINIMAX AI)
         *  ========================================================= */
        const TTT = {
            board: Array(9).fill(null),
            active: true,
            player: 'H', bot: 'B',
            
            init() {
                this.board = Array(9).fill(null);
                this.active = true;
                document.getElementById('ttt-status').innerText = "Твій хід 💖";
                
                const grid = document.getElementById('ttt-grid');
                grid.innerHTML = '';
                for(let i=0; i<9; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell glass';
                    cell.onclick = () => this.makeMove(i);
                    grid.appendChild(cell);
                }
            },

            makeMove(i) {
                if(!this.active || this.board[i]) return;
                
                this.board[i] = this.player;
                this.render();
                
                if(this.checkWin(this.board, this.player)) return this.endGame("Ти зламала матрицю! 💖 (Неможливо)", true);
                if(this.isDraw(this.board)) return this.endGame("Нічия! Робот розумний 🤝", false);
                
                this.active = false;
                document.getElementById('ttt-status').innerText = "Робот думає... 🏹";
                
                setTimeout(() => {
                    let bestMove = this.minimax(this.board, this.bot).index;
                    this.board[bestMove] = this.bot;
                    this.render();
                    
                    if(this.checkWin(this.board, this.bot)) return this.endGame("Робот переміг! 🏹", false);
                    if(this.isDraw(this.board)) return this.endGame("Нічия! 🤝", false);
                    
                    document.getElementById('ttt-status').innerText = "Твій хід 💖";
                    this.active = true;
                }, 500); // Штучна затримка для реалістичності
            },

            // Алгоритм Minimax: прораховує всі можливі ходи
            minimax(newBoard, player) {
                let availSpots = newBoard.map((v, i) => v === null ? i : null).filter(v => v !== null);
                
                if (this.checkWin(newBoard, this.player)) return { score: -10 };
                else if (this.checkWin(newBoard, this.bot)) return { score: 10 };
                else if (availSpots.length === 0) return { score: 0 };

                let moves = [];
                for (let i = 0; i < availSpots.length; i++) {
                    let move = {};
                    move.index = availSpots[i];
                    newBoard[availSpots[i]] = player;

                    if (player === this.bot) {
                        let result = this.minimax(newBoard, this.player);
                        move.score = result.score;
                    } else {
                        let result = this.minimax(newBoard, this.bot);
                        move.score = result.score;
                    }

                    newBoard[availSpots[i]] = null;
                    moves.push(move);
                }

                let bestMove;
                if (player === this.bot) {
                    let bestScore = -10000;
                    for (let i = 0; i < moves.length; i++) {
                        if (moves[i].score > bestScore) {
                            bestScore = moves[i].score;
                            bestMove = i;
                        }
                    }
                } else {
                    let bestScore = 10000;
                    for (let i = 0; i < moves.length; i++) {
                        if (moves[i].score < bestScore) {
                            bestScore = moves[i].score;
                            bestMove = i;
                        }
                    }
                }
                return moves[bestMove];
            },

            checkWin(board, p) {
                const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                return wins.some(c => c.every(i => board[i] === p));
            },
            
            isDraw(board) { return !board.includes(null); },

            render() {
                const cells = document.querySelectorAll('#ttt-grid .cell');
                this.board.forEach((val, i) => {
                    if(val && !cells[i].innerHTML) {
                        cells[i].innerHTML = val === 'H' ? ICONS.HEART : ICONS.BOW;
                    }
                });
            },

            endGame(msg, isWin) {
                this.active = false;
                document.getElementById('ttt-status').innerText = msg;
                if(isWin) {
                    let wins = Storage.get('tttWins', 0) + 1;
                    Storage.set('tttWins', wins);
                    App.updateStats();
                }
            }
        };

        /** =========================================================
         *  [GAME 2] FLAPPY HEART (FULL PHYSICS ENGINE)
         *  ========================================================= */
        const Flappy = {
            bird: null, container: null, overlay: null,
            birdY: 220, velocity: 0, gravity: 0.5, jumpStrength: -7,
            pipes: [], frames: 0, score: 0, gameActive: false, animationId: null,
            pipeSpeed: 3, pipeGap: 140, pipeWidth: 60,

            init() {
                this.bird = document.getElementById('flappy-bird');
                this.container = document.getElementById('flappy-container');
                this.overlay = document.getElementById('flappy-gameover');
                this.resetState();
            },

            resetState() {
                this.birdY = 220;
                this.velocity = 0;
                this.pipes.forEach(p => p.top.remove() || p.bottom.remove());
                this.pipes = [];
                this.frames = 0;
                this.score = 0;
                this.updateScore(0);
                this.bird.style.top = this.birdY + 'px';
                this.bird.style.transform = 'rotate(0deg)';
                this.overlay.classList.remove('active');
            },

            start(e) {
                if(e) e.stopPropagation(); // Запобігаємо стрибку при кліку на кнопку
                this.resetState();
                this.gameActive = true;
                this.loop();
            },

            jump() {
                if(!this.gameActive) {
                    if(!this.overlay.classList.contains('active')) this.start();
                    return;
                }
                this.velocity = this.jumpStrength;
            },

            loop() {
                if(!this.gameActive) return;
                
                // Physics
                this.velocity += this.gravity;
                this.birdY += this.velocity;
                this.bird.style.top = this.birdY + 'px';
                
                // Rotation based on velocity
                let rotation = Math.min(Math.max(this.velocity * 4, -20), 70);
                this.bird.style.transform = `rotate(${rotation}deg)`;

                // Boundaries
                if(this.birdY < 0 || this.birdY > 446) return this.gameOver();

                // Pipe Generation
                if(this.frames % 90 === 0) this.spawnPipe();

                // Pipe Movement & Collision
                for(let i = this.pipes.length - 1; i >= 0; i--) {
                    let p = this.pipes[i];
                    p.x -= this.pipeSpeed;
                    p.top.style.left = p.x + 'px';
                    p.bottom.style.left = p.x + 'px';

                    // Collision Detection (AABB)
                    let birdRect = { top: this.birdY + 5, bottom: this.birdY + 29, left: 55, right: 79 };
                    let topPipeRect = { top: 0, bottom: p.topHeight, left: p.x, right: p.x + this.pipeWidth };
                    let botPipeRect = { top: 480 - p.bottomHeight, bottom: 480, left: p.x, right: p.x + this.pipeWidth };

                    if (this.isCollide(birdRect, topPipeRect) || this.isCollide(birdRect, botPipeRect)) {
                        return this.gameOver();
                    }

                    // Score Update
                    if(p.x === 47) {
                        this.score++;
                        this.updateScore(this.score);
                    }

                    // Remove off-screen pipes
                    if(p.x < -this.pipeWidth) {
                        p.top.remove(); p.bottom.remove();
                        this.pipes.splice(i, 1);
                    }
                }

                this.frames++;
                this.animationId = requestAnimationFrame(() => this.loop());
            },

            isCollide(r1, r2) {
                return !(r2.left > r1.right || r2.right < r1.left || r2.top > r1.bottom || r2.bottom < r1.top);
            },

            spawnPipe() {
                let minPipeHeight = 50;
                let maxPipeHeight = 480 - this.pipeGap - minPipeHeight;
                let topHeight = Math.floor(Math.random() * (maxPipeHeight - minPipeHeight + 1) + minPipeHeight);
                let bottomHeight = 480 - topHeight - this.pipeGap;

                let topEl = document.createElement('div');
                topEl.className = 'pipe';
                topEl.style.height = topHeight + 'px';
                topEl.style.top = '0';
                topEl.style.left = '320px';

                let bottomEl = document.createElement('div');
                bottomEl.className = 'pipe';
                bottomEl.style.height = bottomHeight + 'px';
                bottomEl.style.bottom = '0';
                bottomEl.style.left = '320px';

                this.container.appendChild(topEl);
                this.container.appendChild(bottomEl);

                this.pipes.push({ x: 320, top: topEl, bottom: bottomEl, topHeight: topHeight, bottomHeight: bottomHeight });
            },

            updateScore(val) {
                document.getElementById('flappy-score-display').innerText = val;
            },

            gameOver() {
                this.gameActive = false;
                cancelAnimationFrame(this.animationId);
                
                let high = Storage.get('flappyHigh', 0);
                if(this.score > high) {
                    Storage.set('flappyHigh', this.score);
                    App.updateStats();
                }
                
                document.getElementById('flappy-final-score').innerText = this.score;
                this.overlay.classList.add('active');
            }
        };

        /** =========================================================
         *  [APP HUB] CONTROLLER
         *  ========================================================= */
        const App = {
            particles: new ParticleSystem(),
            
            init() {
                this.updateStats();
                TTT.init();
                Flappy.init();
            },
            
            updateStats() {
                document.getElementById('stat-ttt-wins').innerText = Storage.get('tttWins', 0);
                document.getElementById('stat-flappy-high').innerText = Storage.get('flappyHigh', 0);
            },
            
            switchScreen(screenId) {
                // Зупиняємо Flappy якщо виходимо
                if(screenId !== 'flappy' && Flappy.gameActive) Flappy.gameOver();
                
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('screen-' + screenId).classList.add('active');
                
                if(screenId === 'ttt') TTT.init();
                if(screenId === 'flappy') Flappy.init();
            }
        };

        // Запуск додатку після завантаження сторінки
        window.onload = () => App.init();
    </script>
</body>
</html>
